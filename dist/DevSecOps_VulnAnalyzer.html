    situacionEsperada: "El sistema debe escapar todos los caracteres especiales LDAP en los inputs del usuario antes de incluirlos en filtros de búsqueda, previniendo la manipulación de queries del directorio.",
    reglaNegocio: "Los inputs del usuario usados en filtros LDAP deben escaparse con la función de escape del framework antes de su uso; está prohibida la concatenación directa de inputs sin escape en filtros LDAP.",
    depsTecnicas: "• Escape de caracteres especiales LDAP (\\, *, (, ), NUL) en todos los inputs\n• Frameworks que parametrizan queries LDAP automáticamente\n• Allowlist de caracteres permitidos en campos de búsqueda LDAP\n• Cuenta de servicio LDAP con mínimo privilegio",
    propuestaGeneral: "Implementar escape de caracteres especiales LDAP en todos los inputs usados en filtros de directorio y aplicar una allowlist estricta de caracteres permitidos, con cuenta de servicio de mínimo privilegio.",
  },

  // ── 36. XML INJECTION ───────────────────────────────────────────────────────
  "XML Injection":{
    label:"Inyección XML", icon:"📄",
    impactos:`• Permite modificar la estructura de documentos XML, inyectar elementos o atributos no autorizados.
• Puede manipular flujos de negocio que procesan XML (transacciones, configuraciones, SOAP).
• Fuente: CWE-91 — XML Injection.`,
    owasp:`OWASP A03:2021 — Injection | CWE-91
  • Datos del usuario incluidos en documentos XML sin escape de caracteres especiales XML.
  • El parser XML procesa los datos del usuario como markup en lugar de como texto.`,
    proceso:`• La aplicación construye mensajes XML o SOAP concatenando strings con datos del usuario sin encode XML.`,
    solucion:`1. Usar SecurityElement.Escape() en .NET para escapar datos antes de incluirlos en XML.
2. Usar XmlWriter o XDocument para construir XML programáticamente (escapan automáticamente).
3. Nunca construir XML por concatenación de strings con datos del usuario.
4. Validar todos los documentos XML recibidos contra un XSD antes de procesarlos.
Referencia: OWASP XML Security Cheat Sheet`,
    situacionEsperada: "El sistema debe construir documentos XML mediante APIs que escapen automáticamente los caracteres especiales, previniendo que datos del usuario sean interpretados como markup XML.",
    reglaNegocio: "Está prohibida la construcción de documentos XML por concatenación de strings con datos del usuario; debe usarse XmlWriter, XDocument o SecurityElement.Escape() para garantizar el escape correcto.",
    depsTecnicas: "• SecurityElement.Escape() para datos insertados en XML\n• XmlWriter o XDocument para construcción programática de XML\n• Validación XSD de documentos XML recibidos\n• Prohibición de concatenación de strings con datos del usuario en XML",
    propuestaGeneral: "Reemplazar la construcción de XML por concatenación de strings con el uso de APIs de construcción XML que apliquen escape automático, validando los documentos recibidos contra un schema XSD.",
  },

  // ── 37. HTTP HEADER INJECTION ───────────────────────────────────────────────
  "HTTP Header Injection":{
    label:"Inyección de Headers HTTP / CRLF Injection", icon:"📨",
    impactos:`• Permite inyectar headers HTTP arbitrarios mediante caracteres CRLF (\\r\\n) en parámetros que son reflejados en headers de respuesta.
• Puede resultar en envenenamiento de caché HTTP, XSS vía headers, session fixation o phishing.
• Fuente: CWE-113 — Improper Neutralization of CRLF Sequences in HTTP Headers.`,
    owasp:`OWASP A03:2021 — Injection | CWE-113
Fuente: OWASP HTTP Response Splitting Cheat Sheet
  • Parámetros del usuario incluidos en headers de respuesta HTTP sin filtrar \\r\\n.
  • Típicamente en Location header para redirects, Set-Cookie o headers custom.`,
    proceso:`• Los headers de respuesta incluyen datos del usuario (como returnUrl) sin sanitizar los caracteres CRLF.`,
    solucion:`1. Nunca incluir datos del usuario directamente en headers de respuesta.
2. Si es inevitable, eliminar o rechazar inputs que contengan \\r, \\n o %0d, %0a.
3. Usar Url.IsLocalUrl() para validar URLs de redirect.
4. .NET moderno (Core) rechaza automáticamente CRLF en headers — migrar desde .NET Framework legacy si es posible.
Referencia: OWASP HTTP Response Splitting`,
    situacionEsperada: "El sistema debe filtrar los caracteres CRLF (\\r\\n) de todos los datos del usuario que se incluyan en headers de respuesta HTTP, previniendo la inyección de headers adicionales.",
    reglaNegocio: "Los datos del usuario no deben incluirse directamente en headers de respuesta HTTP sin sanitización de caracteres CRLF; los inputs con \\r, \\n, %0d o %0a deben rechazarse o sanitizarse.",
    depsTecnicas: "• Filtrado de caracteres CRLF (\\r, \\n, %0d, %0a) en inputs usados en headers\n• Url.IsLocalUrl() para URLs en Location header\n• Migración a .NET Core/moderno que rechaza CRLF automáticamente en headers",
    propuestaGeneral: "Implementar filtrado de caracteres CRLF en todos los inputs que se incluyan en headers de respuesta y migrar a versiones modernas de .NET que rechacen automáticamente estas secuencias.",
  },

  // ── 38. OAUTH MISCONFIGURATION ──────────────────────────────────────────────
  "OAuth Misconfiguration":{
    label:"Mala Configuración de OAuth 2.0", icon:"🔑",
    impactos:`• Redirect URI abiertos permiten robar el authorization code o access token.
• Ausencia de state parameter permite ataques CSRF en el flujo OAuth.
• Tokens con permisos excesivos exponen más recursos de los necesarios.
• Fuente: CWE-601, CWE-352 en contexto OAuth.`,
    owasp:`OWASP A07:2021 — Identification and Authentication Failures | CWE-601
Fuente: OWASP OAuth 2.0 Security Best Practices (RFC 9700)
  • Redirect URIs no están estrictamente registradas (se permite cualquier subpath o dominio).
  • Ausencia de PKCE (Proof Key for Code Exchange) en flujos de código de autorización.
  • Estado (state) no validado para prevenir CSRF en el callback.`,
    proceso:`• La configuración del cliente OAuth no tiene las redirect URIs exactas registradas y validadas.
• El parámetro state no es generado ni validado en el flujo de autorización.`,
    solucion:`1. Registrar redirect URIs exactas en el servidor de autorización (sin wildcards).
2. Implementar y validar el parámetro state en cada flujo OAuth.
3. Usar PKCE (code_challenge / code_verifier) para todos los flujos de código.
4. Aplicar principio de mínimo privilegio en los scopes solicitados.
5. Validar el token de acceso en cada llamada a la API (signature + exp + iss + aud).
Referencia: RFC 9700 — OAuth 2.0 Security Best Current Practice`,
    situacionEsperada: "El sistema debe configurar OAuth 2.0 con redirect URIs exactas registradas, parámetro state validado en cada flujo y PKCE implementado, siguiendo las mejores prácticas del RFC 9700.",
    reglaNegocio: "Las redirect URIs OAuth deben registrarse exactas sin wildcards; el parámetro state es obligatorio y debe validarse en el callback; los scopes solicitados deben limitarse al mínimo necesario.",
    depsTecnicas: "• Registro exacto de redirect URIs (sin wildcards)\n• Validación del parámetro state en cada flujo OAuth\n• PKCE (code_challenge/code_verifier) en flujos de código\n• Scopes de mínimo privilegio\n• Validación de signature+exp+iss+aud en tokens de acceso",
    propuestaGeneral: "Corregir la configuración OAuth 2.0 registrando redirect URIs exactas, implementando y validando el parámetro state, habilitando PKCE y aplicando mínimo privilegio en los scopes solicitados.",
  },

  // ── 39. BUSINESS LOGIC VULNERABILITY ────────────────────────────────────────
  "Business Logic Vulnerability":{
    label:"Vulnerabilidad de Lógica de Negocio", icon:"💼",
    impactos:`• Permite manipular flujos de negocio para obtener beneficios no autorizados: descuentos no aplicables, omisión de pagos, aprobación de solicitudes sin cumplir requisitos.
• Difícil de detectar con herramientas automáticas de escaneo.
• Impacto financiero directo y pérdida de integridad del sistema.
• Fuente: CWE-840 — Business Logic Errors.`,
    owasp:`OWASP A04:2021 — Insecure Design | CWE-840
Fuente: OWASP Business Logic Vulnerability Testing Guide
  • Los flujos de negocio asumen que los pasos se ejecutan en orden y sin modificación.
  • Ausencia de validación server-side del estado del flujo en cada paso.
  • Parámetros de precios, cantidades o descuentos enviados desde el cliente y aceptados sin re-validación.`,
    proceso:`• Los valores de negocio críticos (precios, montos, aprobaciones) son enviados desde el cliente y aceptados sin re-calcular en el servidor.
• Los flujos multi-paso no validan que los pasos previos se completaron correctamente.`,
    solucion:`1. NUNCA confiar en valores de negocio críticos enviados desde el cliente. Re-calcular siempre en el servidor.
2. Implementar máquina de estados server-side para flujos multi-paso.
3. Validar todas las reglas de negocio en el servidor, independientemente de la validación client-side.
4. Realizar pruebas de lógica de negocio específicas en el QA (no solo pruebas de seguridad técnicas).
5. Registrar todas las transacciones de negocio para auditoría y detección de anomalías.
Referencia: OWASP Testing Guide — Business Logic Testing`,
    situacionEsperada: "El sistema debe recalcular en el servidor todos los valores de negocio críticos (precios, descuentos, montos) sin confiar en valores enviados por el cliente, con validación de estado en flujos multi-paso.",
    reglaNegocio: "Los valores de negocio críticos no pueden provenir del cliente sin re-validación server-side; los flujos multi-paso deben validar la secuencia correcta de pasos mediante máquina de estados en el servidor.",
    depsTecnicas: "• Recálculo server-side de valores de negocio críticos\n• Máquina de estados server-side para flujos multi-paso\n• Validación de reglas de negocio independiente de validación client-side\n• Logging de transacciones para auditoría y detección de anomalías",
    propuestaGeneral: "Implementar recálculo server-side de todos los valores de negocio críticos y una máquina de estados para flujos multi-paso, eliminando la dependencia de valores de negocio enviados desde el cliente.",
  },

  // ── 40. RACE CONDITION ──────────────────────────────────────────────────────
  "Race Condition":{
    label:"Condición de Carrera (Race Condition)", icon:"🏁",
    impactos:`• Permite explotar la ventana temporal entre la verificación de una condición y su uso (TOCTOU).
• En aplicaciones financieras puede resultar en doble gasto, saldo negativo o múltiples usos de un cupón/beneficio.
• Fuente: CWE-362 — Concurrent Execution using Shared Resource with Improper Synchronization.`,
    owasp:`OWASP A04:2021 — Insecure Design | CWE-362 | CWE-367
Fuente: OWASP Race Condition Prevention
  • Operaciones check-then-act no atómicas en transacciones de negocio.
  • Ausencia de locks optimistas o pesimistas en operaciones que modifican recursos compartidos.`,
    proceso:`• Las transacciones financieras o de estado realizan SELECT + validación + UPDATE como operaciones separadas sin bloqueo de la fila.`,
    solucion:`1. Usar transacciones de base de datos con el nivel de aislamiento correcto (Serializable para operaciones críticas).
2. Implementar SELECT ... WITH (UPDLOCK, HOLDLOCK) en SQL Server para bloqueo optimista.
3. Usar optimistic concurrency con RowVersion/Timestamp en Entity Framework.
4. Implementar idempotency keys para operaciones críticas que no deben ejecutarse dos veces.
Referencia: OWASP Race Condition Prevention`,
    situacionEsperada: "El sistema debe ejecutar las operaciones check-then-act de forma atómica mediante transacciones con el nivel de aislamiento apropiado, previniendo condiciones de carrera en operaciones financieras o de estado.",
    reglaNegocio: "Las operaciones que implican verificación y modificación de estado deben ser atómicas mediante transacciones de BD; está prohibido realizar SELECT + UPDATE sin garantías de atomicidad en recursos compartidos.",
    depsTecnicas: "• Transacciones con nivel de aislamiento Serializable para operaciones críticas\n• SELECT WITH (UPDLOCK, HOLDLOCK) en SQL Server\n• Optimistic concurrency con RowVersion/Timestamp en Entity Framework\n• Idempotency keys para operaciones críticas",
    propuestaGeneral: "Implementar transacciones atómicas con el nivel de aislamiento apropiado para operaciones check-then-act críticas, usando bloqueo de filas en SQL Server e idempotency keys para prevenir ejecución duplicada.",
  },

  // ── 41. SUPPLY CHAIN ATTACK ─────────────────────────────────────────────────
  "Supply Chain Attack":{
    label:"Ataque a la Cadena de Suministro de Software", icon:"⛓️",
    impactos:`• Compromiso de código malicioso en dependencias de terceros que se distribuye automáticamente a todos los proyectos que las usan.
• Puede afectar miles de aplicaciones con una sola inserción maliciosa upstream.
• Ejemplos: SolarWinds, Log4Shell, XZ Utils backdoor.
• Fuente: CWE-506 — Embedded Malicious Code.`,
    owasp:`OWASP A06:2021 — Vulnerable and Outdated Components / A08 Software and Data Integrity Failures | CWE-506
Fuente: OWASP Software Supply Chain Security, GitHub Advisory Database, CISA KEV
  • Dependencias descargadas sin verificación de integridad (hash SHA-256 o firma).
  • Ausencia de SBOM (Software Bill of Materials) que inventaríe todas las dependencias.
  • Build pipeline que descarga dependencias en tiempo real sin cache verificado.`,
    proceso:`• El proceso de build descarga paquetes NuGet/npm en tiempo real sin verificar hashes ni usar un mirror interno verificado.
• No existe proceso de revisión de cambios en dependencias críticas.`,
    solucion:`1. Usar lock files (packages.lock.json en NuGet) para fijar versiones exactas y hashes.
2. Configurar NuGet para verificar hashes de paquetes.
3. Usar un mirror/proxy interno de paquetes (Azure Artifacts, Nexus) con paquetes pre-verificados.
4. Generar y mantener un SBOM (Software Bill of Materials) con cada release.
5. Monitorear dependencias con GitHub Dependabot, Snyk o OWASP Dependency-Check.
Referencias: CISA KEV, GitHub Advisory Database, OSV.dev`,
    situacionEsperada: "El sistema debe descargar dependencias desde un mirror interno verificado con lock files y hashes, manteniendo un SBOM actualizado y monitoreando cambios en dependencias críticas.",
    reglaNegocio: "El proceso de build debe usar lock files con hashes verificados para todas las dependencias; está prohibida la descarga de paquetes en tiempo real sin verificación de integridad en el pipeline de producción.",
    depsTecnicas: "• Lock files (packages.lock.json) con hashes de paquetes\n• Mirror/proxy interno (Azure Artifacts, Nexus) con paquetes pre-verificados\n• SBOM generado y mantenido en cada release\n• GitHub Dependabot o Snyk para monitoreo continuo",
    propuestaGeneral: "Implementar lock files con verificación de hashes, un mirror interno de paquetes pre-verificados y generación automática de SBOM en cada release, con monitoreo continuo de dependencias.",
  },

  // ── 42. SUBDOMAIN TAKEOVER ──────────────────────────────────────────────────
  "Subdomain Takeover":{
    label:"Apropiación de Subdominio (Subdomain Takeover)", icon:"🌍",
    impactos:`• Un atacante puede tomar control de un subdominio de la empresa cuyo CNAME apunta a un servicio externo que ya no existe o no está reclamado.
• Permite servir contenido malicioso bajo un dominio de confianza de la empresa.
• Puede usarse para phishing, robo de cookies (si el dominio está en el scope de cookies) o bypass de CSP.
• Fuente: CWE-116 relacionado, sin CWE específico estándar.`,
    owasp:`OWASP A05:2021 — Security Misconfiguration
Fuente: OWASP Testing for Subdomain Takeover (WSTG-CONF-10)
  • Registros DNS que apuntan a servicios externos (GitHub Pages, Azure, Heroku, AWS S3) que ya fueron eliminados pero el registro DNS permanece.`,
    proceso:`• Al desactivar servicios cloud o cambiar proveedores, los registros DNS CNAME correspondientes no son eliminados del DNS de la empresa.`,
    solucion:`1. Auditar todos los registros DNS CNAME y verificar que los destinos existen y son controlados.
2. Antes de eliminar un servicio cloud, eliminar el registro DNS correspondiente.
3. Reclamar explícitamente los subdominios en los servicios cloud (GitHub Pages, Azure Static Web Apps).
4. Usar herramientas de monitoreo continuo de DNS como can-i-take-over-xyz.
Referencia: OWASP WSTG-CONF-10`,
    situacionEsperada: "El sistema debe tener todos los registros DNS CNAME apuntando a servicios activos y controlados por la organización, con un proceso de eliminación de registros DNS al desactivar servicios cloud.",
    reglaNegocio: "Antes de desactivar cualquier servicio cloud con subdominio corporativo, el registro DNS correspondiente debe eliminarse; se requiere auditoría periódica de registros CNAME para verificar que los destinos son válidos.",
    depsTecnicas: "• Auditoría periódica de registros DNS CNAME\n• Proceso de offboarding de servicios cloud con eliminación de DNS\n• Reclamación explícita de subdominios en servicios cloud\n• Monitoreo continuo con can-i-take-over-xyz o similar",
    propuestaGeneral: "Auditar todos los registros DNS CNAME, eliminar los que apunten a servicios ya desactivados e implementar un proceso de gestión de DNS en el offboarding de servicios cloud.",
  },

  // ── 43. INSECURE DIRECT DESERIALIZATION (PICKLE/JAVA) ─────────────────────
  "Deserialization Attack":{
    label:"Ataque de Deserialización de Objetos", icon:"📦",
    impactos:`• Permite ejecución remota de código (RCE) al deserializar objetos maliciosos.
• .NET: BinaryFormatter, NetDataContractSerializer, LosFormatter son vectores conocidos.
• Java: Java Object Serialization con gadget chains en librerías comunes (Commons Collections).
• Fuente: CWE-502 — Deserialization of Untrusted Data.`,
    owasp:`OWASP A08:2021 — Software and Data Integrity Failures | CWE-502
Fuente: OWASP Deserialization Cheat Sheet (cheatsheetseries.owasp.org)
  • Uso de formatos de serialización que permiten instanciar tipos arbitrarios.
  • Datos de deserialización aceptados de fuentes no confiables (red, usuario, archivos).
  • Ausencia de validación de integridad antes de deserializar.`,
    proceso:`• La aplicación deserializa objetos recibidos del cliente o de almacenamiento externo usando BinaryFormatter o configuraciones inseguras de JSON.`,
    solucion:`1. Eliminar uso de BinaryFormatter (obsoleto en .NET 5+, eliminado en .NET 9).
2. Usar System.Text.Json con TypeInfoResolver restrictivo para controlar qué tipos se deserializan.
3. Implementar firma HMAC-SHA256 de los datos serializados y validar antes de deserializar.
4. Nunca deserializar datos de fuentes no confiables con tipos arbitrarios.
Referencia: OWASP Deserialization Cheat Sheet`,
    situacionEsperada: "El sistema debe eliminar el uso de BinaryFormatter y otros serializadores inseguros, usando alternativas modernas con allowlists de tipos y verificación de integridad antes de deserializar.",
    reglaNegocio: "Está prohibido el uso de BinaryFormatter, NetDataContractSerializer o LosFormatter para datos externos; toda deserialización debe emplear allowlists de tipos y firma HMAC para verificación de integridad.",
    depsTecnicas: "• Eliminar BinaryFormatter (System.Text.Json con TypeInfoResolver restrictivo)\n• Firma HMAC-SHA256 de datos serializados antes de deserializar\n• Allowlist de tipos permitidos para deserialización\n• Nunca deserializar datos de fuentes no confiables con tipos arbitrarios",
    propuestaGeneral: "Migrar de BinaryFormatter y serializadores inseguros a System.Text.Json con restricciones de tipo, implementando firma HMAC para verificación de integridad previa a la deserialización.",
  },

  // ── 44. INFORMATION DISCLOSURE ──────────────────────────────────────────────
  "Information Disclosure":{
    label:"Divulgación de Información Sensible", icon:"📢",
    impactos:`• Expone información interna que facilita ataques: versiones de componentes, rutas de servidor, estructura de datos, nombres de usuarios, IPs internas.
• Los atacantes usan esta información para personalizar ataques y reducir el tiempo de explotación.
• Fuente: CWE-200 — Exposure of Sensitive Information to an Unauthorized Actor.`,
    owasp:`OWASP A05:2021 — Security Misconfiguration | CWE-200 | CWE-209 | CWE-116
Fuente: OWASP Testing Guide — Information Gathering
  • Headers HTTP revelan versiones de servidor, framework y sistema operativo.
  • Mensajes de error contienen stack traces, rutas de archivos o consultas SQL.
  • Endpoints de diagnóstico o debug accesibles en producción (/elmah, /trace.axd, /_profiler).`,
    proceso:`• La configuración del servidor IIS y ASP.NET no tiene suprimidos los headers informativos.
• Los errores no manejados llegan al usuario con el stack trace completo.
• Endpoints de diagnóstico del framework no están protegidos o deshabilitados.`,
    solucion:`1. Eliminar headers informativos en web.config:
   <httpRuntime enableVersionHeader="false"/>
   <customHeaders><remove name="X-Powered-By"/><remove name="Server"/></customHeaders>
2. Deshabilitar trace.axd: <trace enabled="false"/>
3. Proteger o deshabilitar /elmah y otros endpoints de diagnóstico en producción.
4. Implementar customErrors con páginas de error genéricas.
5. Revisar que los mensajes de error expuestos al usuario no contengan datos técnicos.
Referencia: OWASP Testing for Information Leakage`,
    situacionEsperada: "El sistema debe eliminar de las respuestas HTTP toda información sobre el stack tecnológico (versiones, rutas, headers informativos) y deshabilitar endpoints de diagnóstico en producción.",
    reglaNegocio: "En producción, los headers HTTP no deben revelar versiones de servidor ni framework; los endpoints de diagnóstico (/elmah, /trace.axd) deben estar deshabilitados o protegidos por autenticación.",
    depsTecnicas: "• Eliminar headers informativos (Server, X-Powered-By, X-AspNet-Version)\n• Deshabilitar trace.axd y endpoints de diagnóstico en producción\n• customErrors con páginas genéricas\n• httpRuntime enableVersionHeader='false'",
    propuestaGeneral: "Eliminar todos los headers informativos del servidor, deshabilitar los endpoints de diagnóstico en producción e implementar páginas de error genéricas para prevenir la divulgación de información del stack tecnológico.",
  },

  // ── 45. CACHE POISONING ─────────────────────────────────────────────────────
  "Cache Poisoning":{
    label:"Envenenamiento de Caché (Cache Poisoning)", icon:"🗑️",
    impactos:`• Permite a un atacante almacenar respuestas maliciosas en el caché compartido que son servidas a otros usuarios.
• Puede resultar en XSS persistente, redirecciones maliciosas o entrega de contenido modificado a múltiples usuarios.
• Fuente: CWE-345 — Insufficient Verification of Data Authenticity.`,
    owasp:`OWASP A05:2021 — Security Misconfiguration | CWE-345
Fuente: PortSwigger Web Security — Web Cache Poisoning
  • El caché almacena respuestas que incluyen datos de headers no cacheados (Host, X-Forwarded-Host).
  • Ausencia de Vary header apropiado en respuestas cacheadas.`,
    proceso:`• La CDN o caché reverso no está configurado para excluir headers que pueden variar por usuario o que contienen datos del atacante.`,
    solucion:`1. Configurar correctamente los headers Vary para incluir todos los inputs que afectan la respuesta.
2. Deshabilitar el caché para respuestas que incluyan datos del usuario.
3. Validar y sanitizar el header Host y X-Forwarded-Host antes de usarlos en URLs de respuesta.
4. Usar Cache-Control: no-store para páginas con datos personalizados.
5. Revisar la configuración del CDN/proxy para que no cachee headers peligrosos.
Referencia: PortSwigger Web Cache Poisoning Research`,
    situacionEsperada: "El sistema debe configurar correctamente las políticas de caché para excluir respuestas con datos del usuario y validar los headers Host y X-Forwarded-Host antes de usarlos en respuestas cacheables.",
    reglaNegocio: "Las respuestas que incluyan datos del usuario o personalizados deben tener Cache-Control: no-store; los headers Host y X-Forwarded-Host deben validarse antes de incluirse en URLs de respuestas cacheadas.",
    depsTecnicas: "• Headers Vary correctamente configurados\n• Cache-Control: no-store para respuestas con datos del usuario\n• Validación de Host y X-Forwarded-Host antes de usarlos\n• Configuración de CDN/proxy para excluir headers peligrosos del caché",
    propuestaGeneral: "Configurar las políticas de caché para prevenir almacenamiento de respuestas con datos del usuario, validar los headers de host utilizados en URLs y revisar la configuración del CDN para excluir inputs peligrosos.",
  },

  // ── 46. CRYPTOGRAPHIC KEY MANAGEMENT ────────────────────────────────────────
  "Insecure Key Management":{
    label:"Gestión Insegura de Claves Criptográficas", icon:"🗝️",
    impactos:`• Claves de cifrado expuestas comprometen todos los datos cifrados con ellas, presentes y pasados.
• Rotación inadecuada de claves prolonga la ventana de exposición en caso de compromiso.
• Fuente: CWE-321 — Use of Hard-coded Cryptographic Key.`,
    owasp:`OWASP A02:2021 — Cryptographic Failures | CWE-321 | CWE-324
Fuente: OWASP Key Management Cheat Sheet (cheatsheetseries.owasp.org)
  • Claves criptográficas hardcodeadas en el código fuente o archivos de configuración.
  • Ausencia de rotación periódica de claves.
  • Claves almacenadas con los datos que protegen.`,
    proceso:`• Las claves de cifrado y los secretos de firma están en web.config o appSettings sin protección adicional, sin rotación definida.`,
    solucion:`1. Usar Azure Key Vault, AWS KMS o HashiCorp Vault para almacenamiento de claves.
2. En .NET Core, usar Data Protection API para claves de sesión y tokens.
3. Implementar rotación de claves periódica (mínimo anual, recomendado trimestral para datos sensibles).
4. Separar almacenamiento de claves del almacenamiento de datos cifrados.
5. Usar HSM (Hardware Security Module) para claves de alto valor.
Referencia: OWASP Key Management Cheat Sheet`,
    situacionEsperada: "El sistema debe gestionar todas las claves criptográficas mediante un vault corporativo (Azure Key Vault, AWS KMS) con rotación periódica, separando el almacenamiento de claves de los datos cifrados.",
    reglaNegocio: "Las claves criptográficas no pueden almacenarse en código fuente ni en archivos de configuración versionados; deben gestionarse mediante un vault corporativo aprobado con política de rotación periódica.",
    depsTecnicas: "• Azure Key Vault / AWS KMS para almacenamiento de claves\n• Data Protection API en .NET Core para claves de sesión\n• Rotación periódica de claves (mínimo anual)\n• Separación de almacenamiento de claves y datos cifrados\n• HSM para claves de alto valor",
    propuestaGeneral: "Migrar todas las claves criptográficas a un vault corporativo aprobado (Azure Key Vault, AWS KMS), implementar rotación periódica y separar el almacenamiento de claves del de datos cifrados.",
  },

  // ── 47. BROKEN OBJECT LEVEL AUTHORIZATION ───────────────────────────────────
  "Broken Object Level Authorization":{
    label:"Autorización Rota a Nivel de Objeto (BOLA/IDOR)", icon:"🎯",
    impactos:`• El API endpoint más explotado según OWASP API Security Top 10.
• Permite acceder a objetos de cualquier usuario modificando el ID del recurso.
• Sin validación de propiedad del objeto, cualquier usuario autenticado puede acceder a datos de otros.
• Fuente: CWE-639, relacionado con OWASP API1:2023.`,
    owasp:`OWASP API1:2023 — Broken Object Level Authorization | CWE-639
Fuente: OWASP API Security Top 10 2023 (owasp.org/API-Security)
  • Los endpoints de API usan IDs de objetos predecibles sin verificar que pertenecen al usuario autenticado.
  • Ausencia de autorización granular a nivel de recurso (row-level).`,
    proceso:`• Los endpoints API GET /api/polizas/{id} o PUT /api/contratos/{id} no verifican que el recurso {id} pertenece al usuario del token.`,
    solucion:`1. Implementar verificación de propiedad en TODOS los endpoints:
   var poliza = await db.Polizas.FirstOrDefaultAsync(p => p.Id == id && p.OwnerId == currentUserId);
   if (poliza == null) return Forbid();
2. Usar GUIDs/ULIDs en lugar de IDs secuenciales.
3. Implementar middleware de autorización que valide ownership automáticamente.
4. Incluir pruebas de BOLA en la suite de pruebas de seguridad de la API.
Referencia: OWASP API Security Top 10 — API1:2023`,
    situacionEsperada: "Todos los endpoints de API deben verificar que el recurso solicitado pertenece al usuario autenticado del token, retornando 403 Forbidden ante cualquier intento de acceso a recursos ajenos.",
    reglaNegocio: "Cada endpoint de API que acceda a un recurso por ID debe incluir validación de ownership contra el usuario del token JWT; el acceso a recursos de otros usuarios debe bloquearse con 403 y registrarse.",
    depsTecnicas: "• Verificación de OwnerId en cada consulta de API (filter por usuario del token)\n• GUIDs/ULIDs en lugar de IDs secuenciales\n• Middleware de autorización con validación de ownership automática\n• Pruebas de BOLA en suite de seguridad de API",
    propuestaGeneral: "Implementar verificación de ownership en todos los endpoints de API, asegurando que cada consulta a BD filtre por el usuario del token JWT, con GUIDs como identificadores para dificultar la enumeración.",
  },

  // ── 48. SENSITIVE DATA IN URL ────────────────────────────────────────────────
  "Sensitive Data in URL":{
    label:"Datos Sensibles en URL / Query String", icon:"🔗",
    impactos:`• URLs con datos sensibles (tokens, contraseñas, IDs) quedan en logs de servidor, historial del navegador, headers Referer y logs de proxies.
• Pueden ser filtrados accidentalmente a terceros a través del header Referer.
• Fuente: CWE-598 — Use of GET Request Method with Sensitive Query Strings.`,
    owasp:`OWASP A02:2021 — Cryptographic Failures | CWE-598
Fuente: OWASP Transport Layer Security Cheat Sheet
  • Parámetros de autenticación, tokens de sesión o datos PII incluidos en query strings de URLs GET.
  • Tokens de reset de contraseña o magic links expuestos en logs.`,
    proceso:`• El flujo de autenticación pasa tokens o credenciales como parámetros GET en la URL en lugar de en el cuerpo de la solicitud o headers.`,
    solucion:`1. Pasar datos sensibles siempre en el cuerpo de una solicitud POST, nunca en query strings.
2. Los tokens de reset de contraseña deben ser de un solo uso, con expiración corta (15 min) y pasar por POST.
3. Agregar header Referrer-Policy: no-referrer-when-downgrade para limitar fugas por Referer.
4. Revisar configuración de logs del servidor para no registrar query strings con datos sensibles.
Referencia: OWASP Transport Layer Security Cheat Sheet`,
    situacionEsperada: "El sistema debe transmitir todos los datos sensibles (tokens, credenciales, datos PII) en el cuerpo de solicitudes POST o en headers, nunca en query strings de URLs GET.",
    reglaNegocio: "Los tokens de autenticación, credenciales y datos PII están prohibidos en query strings de URLs; deben transmitirse en el cuerpo POST o en headers HTTP seguros para evitar exposición en logs y Referer.",
    depsTecnicas: "• Datos sensibles en cuerpo POST, nunca en query strings\n• Tokens de reset de un solo uso con expiración corta (15 min)\n• Referrer-Policy: no-referrer-when-downgrade header\n• Revisión de logs para excluir query strings con datos sensibles",
    propuestaGeneral: "Refactorizar los flujos que transmiten datos sensibles en query strings para usar cuerpos POST o headers seguros, implementando Referrer-Policy para limitar fugas involuntarias a través del header Referer.",
  },

  // ── 49. API KEY EXPOSURE ─────────────────────────────────────────────────────
  "API Key Exposure":{
    label:"Exposición de Claves de API (API Key Exposure)", icon:"🔑",
    impactos:`• Una API key expuesta permite al atacante usar el servicio en nombre de la empresa: llamadas a APIs de pago, acceso a datos de clientes, consumo de servicios cloud.
• Impacto económico directo si la API key tiene acceso a servicios de pago por uso.
• Posible exfiltración de datos a través del servicio comprometido.
• Fuente: CWE-522 — Insufficiently Protected Credentials.`,
    owasp:`OWASP A02:2021 — Cryptographic Failures | CWE-522 | CWE-798
Fuente: GitHub Advisory Database, OWASP Secrets Management Cheat Sheet
  • API keys en código fuente versionado en repositorios (incluso privados).
  • API keys en variables de entorno expuestas en logs o respuestas de error.
  • API keys sin restricciones de IP, dominio o scope de permisos.`,
    proceso:`• Las claves de API de servicios externos se almacenan en web.config, appsettings.json o directamente en el código, y son versionadas en el repositorio Git.`,
    solucion:`1. Mover todas las API keys a variables de entorno del servidor o a Azure Key Vault.
2. Rotar INMEDIATAMENTE cualquier key que haya estado en el repositorio.
3. Configurar restricciones en las API keys: IPs permitidas, dominios, permisos mínimos.
4. Agregar git-secrets o truffleHog al pre-commit hook y al pipeline CI/CD.
5. Revisar el historial completo de Git con truffleHog para detectar keys históricas.
Referencia: OWASP Secrets Management Cheat Sheet, GitHub Advisory Database`,
    situacionEsperada: "El sistema debe almacenar todas las API keys en un vault corporativo o variables de entorno del servidor, sin que aparezcan en código fuente, archivos de configuración versionados ni logs.",
    reglaNegocio: "Las API keys de servicios externos están prohibidas en código fuente y archivos versionados; deben almacenarse en Azure Key Vault o variables de entorno con restricciones de IP, dominio y permisos mínimos.",
    depsTecnicas: "• Azure Key Vault o variables de entorno del servidor para API keys\n• Rotación inmediata de keys expuestas en historial de Git\n• Restricciones de IP/dominio/permisos en cada API key\n• git-secrets o truffleHog en pre-commit hook y pipeline CI/CD",
    propuestaGeneral: "Migrar todas las API keys a Azure Key Vault o variables de entorno, rotar las expuestas en el historial de Git e implementar escaneo automático de secretos en el pipeline CI/CD.",
  },

  // ── 50. DEFAULT ──────────────────────────────────────────────────────────────

  // ── CLEARTEXT TRANSMISSION ──────────────────────────────────────────────────
  "Cleartext Transmission of Sensitive Information":{
    label:"Transmisión en Texto Claro de Información Sensible", icon:"🔓",
    impactos:`• La información sensible (credenciales, tokens, datos personales) viaja sin cifrado y puede ser interceptada con herramientas de captura de red (Wireshark, tcpdump).
• Riesgo de exposición de credenciales de servicios internos (CyberArk, PaymentHub) que permiten acceso privilegiado no autorizado.
• Uso de versiones obsoletas de TLS (TLS 1.0/1.1) que tienen vulnerabilidades conocidas y no proveen cifrado robusto.
• Incumplimiento regulatorio: PCI-DSS requiere TLS ≥ 1.2 para transmisión de datos de tarjetas; GDPR exige protección de datos en tránsito.
• Impacto en disponibilidad si el atacante modifica datos en tránsito (Man-in-the-Middle).`,
    owasp:`OWASP A02:2021 — Cryptographic Failures (antes Sensitive Data Exposure)
CWE-319: Cleartext Transmission of Sensitive Information
CWE-326: Inadequate Encryption Strength
Fuente: OWASP Transport Layer Security Cheat Sheet (cheatsheetseries.owasp.org)
  • Uso de protocolos obsoletos: TLS 1.0, TLS 1.1, SSL 3.0 están deprecados (RFC 7568, RFC 8996).
  • En .NET Framework: ServicePointManager.SecurityProtocol debe forzar TLS 1.2/1.3 explícitamente.
  • Los archivos CyberArkAPI.cs y PaymetHubApi.cs realizan llamadas HTTP a APIs internas sin forzar TLS seguro.
  • Web.config puede exponer configuración sensible si customErrors está deshabilitado.`,
    proceso:`• Los archivos BusinessLogic/CyberArkService/CyberArkAPI.cs y BusinessLogic/PaymentHubAPI/PaymetHubApi.cs realizan llamadas a servicios externos usando HttpClient sin forzar protocolo TLS seguro.
• El archivo BusinessLogic/Security.cs implementa configuraciones de seguridad de red que permiten versiones deprecadas de TLS.
• .NET Framework por defecto en versiones antiguas permite TLS 1.0/1.1 a menos que se configure explícitamente lo contrario.
• Web.config con customErrors="Off" puede revelar rutas absolutas y stack traces en producción.`,
    solucion:`1. Forzar TLS 1.2/1.3 globalmente en Application_Start (Global.asax.cs):
   ServicePointManager.SecurityProtocol = SecurityProtocolType.Tls12 | SecurityProtocolType.Tls13;

2. En cada HttpClient de CyberArkAPI.cs y PaymetHubApi.cs:
   var handler = new HttpClientHandler {
     SslProtocols = SslProtocols.Tls12 | SslProtocols.Tls13,
     CheckCertificateRevocationList = true
   };

3. En Web.config, habilitar customErrors en producción:
   <customErrors mode="On" defaultRedirect="~/Error"/>

4. Verificar y deshabilitar TLS 1.0/1.1 a nivel de servidor IIS (registro de Windows o IIS Crypto).

5. Ejecutar escaneo con SSL Labs o similar para confirmar configuración TLS post-corrección.`,
    situacionEsperada: "El sistema debe forzar TLS 1.2/1.3 en todas las comunicaciones de red, rechazando conexiones con protocolos obsoletos (TLS 1.0/1.1, SSL 3.0) tanto en cliente como en servidor.",
    reglaNegocio: "Todas las comunicaciones que transmitan datos sensibles deben usar TLS ≥ 1.2; los protocolos SSL, TLS 1.0 y TLS 1.1 están prohibidos en producción por incumplimiento de PCI-DSS y GDPR.",
    depsTecnicas: "• ServicePointManager.SecurityProtocol = Tls12 | Tls13 en Application_Start\n• HttpClientHandler con SslProtocols.Tls12 | Tls13 en cada cliente HTTP\n• Deshabilitar TLS 1.0/1.1 en IIS (IIS Crypto o registro de Windows)\n• Validación con SSL Labs post-corrección",
    propuestaGeneral: "Forzar TLS 1.2/1.3 en todas las comunicaciones del sistema mediante configuración en Global.asax.cs y en cada HttpClient, deshabilitando los protocolos obsoletos a nivel de servidor IIS.",

    label:"Revelación de Detalles de Error (Error Handling)", icon:"📋",
    impactos:`• Expone rutas absolutas del servidor web, nombres de servidores, versión de frameworks y stack traces al atacante.

• Revela tecnologías y versiones exactas del stack (ASP.NET versión, IIS versión) que facilitan la búsqueda de exploits conocidos.
• Puede exponer cadenas de conexión, nombres de variables internas o lógica de negocio sensible en mensajes de error detallados.`,
    owasp:`OWASP A05:2021 — Security Misconfiguration
CWE-209: Generation of Error Message Containing Sensitive Information
CWE-200: Exposure of Sensitive Information to an Unauthorized Actor
Fuente: OWASP Error Handling Cheat Sheet (cheatsheetseries.owasp.org)
  • Los mensajes de error detallados en producción son una misconfiguration de seguridad clásica.
  • ASP.NET MVC con customErrors="Off" devuelve la excepción completa con stack trace al cliente.
  • El archivo Web.config con debug="true" activa trazas detalladas visibles en el navegador.`,
    proceso:`• El archivo Web.config tiene configurado customErrors="Off" o mode="RemoteOnly", lo que permite que los errores no manejados se muestren con detalle completo en el navegador.
• El atributo debug="true" en la sección <compilation> de Web.config activa información de diagnóstico adicional.
• No existe un manejador global de errores que intercepte excepciones no controladas y devuelva páginas de error genéricas.
• Los controladores MVC no tienen manejo uniforme de excepciones con IExceptionFilter o HandleErrorAttribute configurado globalmente.`,
    solucion:`1. En Web.config, configurar customErrors en modo seguro:
   <customErrors mode="On" defaultRedirect="~/Views/Shared/Error.cshtml"/>
   <compilation debug="false" targetFramework="4.x"/>

2. Implementar manejador global de errores en Global.asax.cs:
   Application_Error: log interno + redirect a página genérica sin detalles.

3. Registrar ExceptionFilter global en FilterConfig.cs:
   filters.Add(new HandleErrorAttribute());

4. Usar logging interno (log4net, NLog, Serilog) para registrar el detalle del error — nunca al cliente.

5. Revisar todos los bloques catch que hagan Response.Write o return Json(ex.Message) y reemplazar con mensajes genéricos.`,
    situacionEsperada: "El sistema debe mostrar páginas de error genéricas sin detalles técnicos al usuario, registrando el stack trace completo únicamente en el sistema de logging interno, con debug deshabilitado en producción.",
    reglaNegocio: "En producción, customErrors debe estar en modo 'On' y debug='false'; ningún error debe exponer stack traces, rutas absolutas ni información del stack tecnológico al cliente; el detalle se registra solo internamente.",

    propuestaGeneral: "Configurar customErrors en modo 'On' con debug='false' en producción, implementar un manejador global de errores que registre internamente y muestre páginas genéricas al usuario, revisando todos los bloques catch.",

    impactos:`• El uso de algoritmos criptográficos débiles o no estándar hace que datos cifrados sean recuperables por un atacante con recursos moderados.

• Compromiso de confidencialidad de datos sensibles cifrados en la aplicación (credenciales, tokens, datos de asegurados).

CWE-326: Inadequate Encryption Strength

Fuente: OWASP Cryptographic Storage Cheat Sheet (cheatsheetseries.owasp.org)
  • El archivo AsymmetricRSAEncryption.cs implementa RSA con configuración no estándar o tamaño de clave insuficiente.
  • NIST recomienda RSA ≥ 2048 bits con OAEP padding; PKCS#1 v1.5 está deprecado para cifrado.
  • Algoritmos prohibidos: MD5, SHA-1, DES, 3DES, RC4, RSA <2048 bits.`,
    proceso:`• El archivo BusinessLogic/Utilerias/AsymmetricRSAEncryption.cs implementa cifrado RSA con parámetros que no cumplen los estándares actuales de seguridad.
• Posiblemente usa RSACryptoServiceProvider con tamaño de clave <2048 bits o padding PKCS#1 v1.5 en lugar de OAEP.
• No se valida el tamaño mínimo de clave en tiempo de ejecución.
• La implementación fue desarrollada sin seguir las guías NIST/OWASP de criptografía segura.`,
    solucion:`1. En AsymmetricRSAEncryption.cs, migrar a RSA con OAEP y clave mínima 2048 bits:
   // ANTES (inseguro):
   var rsa = new RSACryptoServiceProvider(1024);
   var encrypted = rsa.Encrypt(data, false); // PKCS#1 v1.5

   // DESPUÉS (seguro):
   using var rsa = RSA.Create(2048);
   var encrypted = rsa.Encrypt(data, RSAEncryptionPadding.OaepSHA256);

2. Para hashing: reemplazar MD5/SHA-1 por SHA-256 o SHA-512 (System.Security.Cryptography.SHA256).

3. Para cifrado simétrico: usar AES-256-GCM en lugar de DES/3DES/RC4.

4. Ejecutar análisis estático post-corrección con SonarQube o Checkmarx para confirmar eliminación de algoritmos débiles.

5. Documentar el esquema criptográfico actualizado en el diseño técnico de seguridad.`,

    propuestaGeneral: "Migrar AsymmetricRSAEncryption.cs a RSA ≥ 2048 bits con OAEP padding, reemplazar los algoritmos hash y simétricos obsoletos por estándares NIST vigentes y validar con análisis estático post-corrección.",

// ── KB RESOLVER ─────────────────────────────────────────────────────────────
const getKB = (t) => {
  if (VULN_KB[t]) return VULN_KB[t];
  if (VULN_ALIASES[t]) return VULN_KB[VULN_ALIASES[t]] || { ...VULN_KB["default"], label: t, _isDefault: true };
  const tLow = t.toLowerCase();
  for (const [alias, canonical] of Object.entries(VULN_ALIASES)) {
    if (tLow.includes(alias.toLowerCase())) return VULN_KB[canonical] || { ...VULN_KB["default"], label: t, _isDefault: true };
  }
  return { ...VULN_KB["default"], label: t, _isDefault: true };
};

                  ))}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:12,marginTop:8}}>
                  <div>
                    <label style={lbl}>SonarQube Base URL</label>

                    <input style={inp} value={cfg.sonarProjectKey} onChange={e=>setCfg(p=>({...p,sonarProjectKey:e.target.value}))} placeholder="NAGH-APM0001304-mexico-it-chubbnet-"/>
                    <div style={{fontSize:9,color:"#2A4060",fontFamily:"monospace",marginTop:4}}>

                    </div>
                  </div>
                </div>
              </div>

              <div style={card()}>
                <div style={{fontSize:11,fontWeight:700,color:"#00D4FF",letterSpacing:1.5,marginBottom:12,textTransform:"uppercase",fontFamily:"monospace"}}>📂 Importar Excel</div>
                <div style={infoBox}><strong style={{color:"#00D4FF"}}>Columnas detectadas:</strong> Issue Id · Severity · Issue Type Name · Threat Class · Repo · Discovery Method · Git Source File Uri · hrs · Release · Comentario</div>
                <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} style={{display:"none"}}/>
                <button style={btnP} onClick={()=>fileRef.current.click()}>📂 Seleccionar Archivo Excel</button>

              {issues.length>0&&(
                <>

                      <div key={s.l} style={card({marginBottom:0,textAlign:"center"})}>
                        <div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div>

                    ))}
                  </div>
                  <div style={card()}>
                    <div style={{fontSize:11,fontWeight:700,color:"#00D4FF",letterSpacing:1.5,marginBottom:12,textTransform:"uppercase",fontFamily:"monospace"}}>📋 Issues Importados ({issues.length})</div>

                        <tbody>
                          {issues.map((iss,i)=>(
                            <tr key={i}>
                              <td style={{padding:"8px 10px",borderBottom:"1px solid #111D2E",verticalAlign:"middle"}}><span style={sevBadge(iss.severity)}>{SEV[iss.severity]?.label||iss.severity}</span></td>
                              <td style={{padding:"8px 10px",borderBottom:"1px solid #111D2E",color:"#D0DCF0",maxWidth:150}}>{TYPE_MAP[iss.issueType]||iss.issueType}</td>
                              <td style={{padding:"8px 10px",borderBottom:"1px solid #111D2E",color:"#8AACCC"}}>{iss.repo}</td>
                              <td style={{padding:"8px 10px",borderBottom:"1px solid #111D2E",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}><span style={{fontFamily:"monospace",fontSize:10,color:"#00D4FF"}} title={iss.filePath}>{iss.fileName}</span></td>
                              <td style={{padding:"8px 10px",borderBottom:"1px solid #111D2E"}}><span style={methBadge("sast")}>{iss.method||"SAST"}</span></td>
                              <td style={{padding:"8px 10px",borderBottom:"1px solid #111D2E",color:"#8AACCC",textAlign:"right"}}>{iss.hrs}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </>
              )}
            </div>
  );
}

// ── DiagnosticoPhase ─────────────────────────────────────────────────────────────────
// Props destructured from App state
function DiagnosticoPhase({ cfg, issues, repos, stats, sonarData, setSonarF, fetchSonar, mcpUrl, setMcpUrl, mcpStatus, checkMcpStatus, getSonarUrl, checkRepo, checkAll, completePhase, showSources, setShowSources, getSourcesDisplay, card, inp, infoBox, warnBox, lbl, btnP, btnS, btnG, btnA, dot, methBadge, sevBadge }) {
  return (
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24,paddingBottom:18,borderBottom:"1px solid #1A2840"}}>
                <div>
                  <div style={{fontSize:10,color:"#00D4FF",letterSpacing:2,fontFamily:"monospace",marginBottom:4}}>FASE 1 — DIAGNÓSTICO</div>
                  <div style={{fontSize:24,fontWeight:800,color:"#E0EDFF"}}>Verificación Pipeline + Deuda Técnica</div>
                  <div style={{fontSize:12,color:"#4A6080",marginTop:4}}>Verificación dual: Jenkinsfile en Git + Job activo en Jenkins + SonarQube.</div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button style={btnA} onClick={checkAll}>⚡ Analizar Todos</button>
                  <button style={btnP} onClick={()=>completePhase(1)}>Continuar →</button>
                </div>
              </div>

              {issues.length===0&&<div style={warnBox}>⚠ Sin issues. Regresa a Fase 0 para importar el Excel.</div>}

              {/* SonarQube MCP Server */}
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,padding:"10px 14px",background:"#060B14",border:`1px solid ${mcpStatus==="ok"?"#00E67630":mcpStatus==="error"?"#FF456030":"#1A2840"}`,borderRadius:8}}>
                <span style={{fontSize:10,color:"#00D4FF",fontFamily:"monospace",whiteSpace:"nowrap"}}>⚡ SONAR MCP</span>
                <input style={{...inp,flex:1,fontSize:11}} value={mcpUrl} onChange={e=>setMcpUrl(e.target.value)} placeholder="http://127.0.0.1:3747"/>
                <button
                  onClick={()=>checkMcpStatus(mcpUrl)}
                  disabled={mcpStatus==="checking"}
                  style={{padding:"6px 12px",borderRadius:6,border:"1px solid #00D4FF40",background:"#00D4FF10",color:"#00D4FF",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"monospace",whiteSpace:"nowrap",opacity:mcpStatus==="checking"?0.6:1}}>
                  {mcpStatus==="checking"?"⟳…":"Conectar"}
                </button>
                <span style={{fontSize:10,fontFamily:"monospace",whiteSpace:"nowrap",color:mcpStatus==="ok"?"#00E676":mcpStatus==="error"?"#FF4560":"#2A4060"}}>
                  {mcpStatus==="ok"?"● Conectado":mcpStatus==="error"?"● Sin conexión":mcpStatus==="checking"?"● Verificando…":"● Sin verificar"}
                </span>
                <span style={{fontSize:9,color:"#2A4060",fontFamily:"monospace",whiteSpace:"nowrap"}}>node sonar-mcp-server.js</span>
              </div>

              {/* Distribución por tipo */}
              <div style={card()}>
                <div style={{fontSize:11,fontWeight:700,color:"#00D4FF",letterSpacing:1.5,marginBottom:12,textTransform:"uppercase",fontFamily:"monospace"}}>📊 Distribución por Tipo</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {stats.byType.map(t=>(
                    <div key={t.type} style={{background:"#0F1E35",border:"1px solid #1A2840",borderRadius:8,padding:"8px 14px",textAlign:"center",minWidth:100}}>
                      <div style={{fontSize:20,fontWeight:800,color:"#FF4560"}}>{t.count}</div>
                      <div style={{fontSize:10,color:"#3A5070",maxWidth:120,marginTop:2}}>{TYPE_MAP[t.type]||t.type}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Repo cards */}
              {Object.values(repos).map(repo=>{
                const repoName=repo.name;
                const isChecking=repo.gitCheckStatus==="checking"||repo.jenkinsCheckStatus==="checking"||repo.debtStatus==="checking";
                const isDone=repo.debtStatus==="ok";
                const method=repo.method||"unknown";
                return (
                  <div key={repo.name} style={card({border:`1px solid ${isDone?(method==="pipeline"?"#00D4FF30":"#A78BFA30"):"#1A2840"}`})}>
                    {/* Header */}
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:36,height:36,borderRadius:8,background:"#0F1E35",border:"1px solid #1A2840",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🗃</div>
                        <div>
                          <div style={{fontWeight:700,color:"#E0EDFF",fontSize:14}}>{repo.name}</div>
                          <div style={{fontSize:10,color:"#3A5070",fontFamily:"monospace",marginTop:1}}>{repo.issues.length} vulnerabilidades · {repo.gitUrl||cfg.gitBase+repo.name}</div>
                        </div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        {isDone&&<span style={methBadge(method)}>{method==="pipeline"?"⚡ Pipeline CI/CD":"🔧 Manual"}</span>}
                        {!isDone&&<button style={{...btnG,fontSize:11,opacity:isChecking?0.6:1}} onClick={()=>!isChecking&&checkRepo(repo.name)} disabled={isChecking}>{isChecking?"⟳ Analizando…":"🔍 Analizar Repo"}</button>}
                      </div>
                    </div>

                    {/* 3 panels */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                      {/* Git / Jenkinsfile */}
                      <div style={{background:"#060B14",borderRadius:8,padding:14,border:`1px solid ${repo.gitCheckStatus==="ok"?"#00E67630":repo.gitCheckStatus==="error"?"#FF456030":"#1A2840"}`}}>
                        <div style={{fontSize:10,color:"#3A5070",fontFamily:"monospace",marginBottom:10}}>📁 GIT — JENKINSFILE</div>
                        <div style={{display:"flex",alignItems:"flex-start",gap:6,marginBottom:8}}>
                          <span style={dot(repo.gitCheckStatus||"gray")}/>
                          <div>
                            <div style={{fontSize:11,fontWeight:600,color:repo.gitCheckStatus==="ok"?"#00E676":repo.gitCheckStatus==="error"?"#FF4560":repo.gitCheckStatus==="checking"?"#FFB800":"#3A5070"}}>
                              {repo.gitCheckStatus==="ok"?"Jenkinsfile encontrado":repo.gitCheckStatus==="error"?"Jenkinsfile ausente":repo.gitCheckStatus==="checking"?"Buscando…":"Sin verificar"}
                            </div>
                            <div style={{fontSize:10,color:"#3A5070",marginTop:2,fontFamily:"monospace"}}>{repo.gitCheckMsg||"GET /raw/master/Jenkinsfile"}</div>
                          </div>
                        </div>
                        <div style={{fontSize:10,color:"#2A4060",fontFamily:"monospace",wordBreak:"break-all",padding:"5px 8px",background:"#0A1020",borderRadius:4}}>{(repo.gitUrl||cfg.gitBase+repo.name)+"/raw/master/Jenkinsfile"}</div>
                      </div>

                      {/* Jenkins job */}
                      <div style={{background:"#060B14",borderRadius:8,padding:14,border:`1px solid ${repo.jenkinsCheckStatus==="ok"?"#00D4FF30":repo.jenkinsCheckStatus==="error"?"#FF456030":"#1A2840"}`}}>
                        <div style={{fontSize:10,color:"#3A5070",fontFamily:"monospace",marginBottom:10}}>⚙ JENKINS — JOB ACTIVO</div>
                        <div style={{display:"flex",alignItems:"flex-start",gap:6,marginBottom:8}}>
                          <span style={dot(repo.jenkinsCheckStatus==="ok"?"ok":repo.jenkinsCheckStatus==="error"?"error":repo.jenkinsCheckStatus==="checking"?"checking":"gray")}/>
                          <div>
                            <div style={{fontSize:11,fontWeight:600,color:repo.jenkinsCheckStatus==="ok"?"#00D4FF":repo.jenkinsCheckStatus==="error"?"#FF4560":repo.jenkinsCheckStatus==="checking"?"#FFB800":"#3A5070"}}>
                              {repo.jenkinsCheckStatus==="ok"?"Job activo en Jenkins":repo.jenkinsCheckStatus==="error"?"Job no encontrado":repo.jenkinsCheckStatus==="checking"?"Verificando…":repo.jenkinsCheckStatus==="skipped"?"Omitido (sin Jenkinsfile)":"Pendiente de Step 1"}
                            </div>
                            <div style={{fontSize:10,color:"#3A5070",marginTop:2,fontFamily:"monospace"}}>{repo.jenkinsCheckMsg||"GET /api/json?tree=lastBuild"}</div>
                          </div>  
                        </div>
                        {repo.lastBuild&&(
                          <div style={{display:"flex",gap:6,marginTop:4}}>
                            <span style={{background:"#0A1020",borderRadius:4,padding:"3px 7px",fontSize:10,fontFamily:"monospace",color:"#8AACCC"}}>Build: <strong style={{color:"#E0EDFF"}}>{repo.lastBuild}</strong></span>
                            <span style={{background:"#0A1020",borderRadius:4,padding:"3px 7px",fontSize:10,fontFamily:"monospace",color:repo.lastBuildStatus==="SUCCESS"?"#00E676":"#FF4560",fontWeight:700}}>{repo.lastBuildStatus}</span>
                          </div>
                        )}
                        <div style={{fontSize:10,color:"#2A4060",fontFamily:"monospace",wordBreak:"break-all",padding:"5px 8px",background:"#0A1020",borderRadius:4,marginTop:6}}>{(repo.jenkinsUrl||cfg.jenkinsBase+repo.name)+"/api/json"}</div>
                      </div>

                      {/* SonarQube — manual entry panel */}
                      {(()=>{
                        const sd = sonarData[repoName] || {};
                        const qgOk = sd.qg==="Passed";
                        const qgSet = !!sd.qg;
                        const sonarUrl = getSonarUrl(repoName, sd.branch || cfg.ticket);
                        const ratingColor = r => ({A:"#00E676",B:"#69F0AE",C:"#FFB800",D:"#FF7043",E:"#FF4560"}[r]||"#3A5070");
                        return (
                          <div style={{background:"#060B14",borderRadius:8,padding:14,border:`1px solid ${qgSet?(qgOk?"#00E67640":"#FF456040"):"#1A2840"}`}}>
                            {/* Header + URL */}
                            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                              <div style={{fontSize:10,color:"#3A5070",fontFamily:"monospace"}}>📊 SONARQUBE — DEUDA TÉCNICA</div>
                              <a href={sonarUrl} target="_blank" rel="noopener noreferrer"
                                style={{fontSize:10,color:"#00D4FF",background:"#00D4FF10",padding:"3px 10px",borderRadius:4,border:"1px solid #00D4FF30",textDecoration:"none",fontFamily:"monospace",display:"flex",alignItems:"center",gap:5}}>
                                🔗 Abrir SonarQube ↗
                              </a>
                            </div>

                            {/* Dynamic URL preview */}
                            <div style={{fontSize:9,color:"#2A4060",fontFamily:"monospace",wordBreak:"break-all",padding:"4px 8px",background:"#030810",borderRadius:4,marginBottom:10,border:"1px solid #0A1828"}}>
                              {sonarUrl}
                            </div>

                            {/* Branch field + Fetch button */}
                            <div style={{marginBottom:10}}>
                              <label style={lbl}>Branch (ej. CNEV-374)</label>
                              <div style={{display:"flex",gap:6}}>
                                <input style={{...inp,flex:1,fontSize:11}} value={sd.branch||""} onChange={e=>setSonarF(repoName,"branch",e.target.value)} placeholder="CNEV-374"/>
                                <button
                                  onClick={()=>fetchSonar(repoName, sd.branch||"")}
                                  disabled={sd._fetching}
                                  style={{padding:"6px 12px",borderRadius:6,border:"1px solid #00D4FF40",background:sd._fetching?"#00D4FF10":"#00D4FF15",color:"#00D4FF",fontSize:11,fontWeight:700,cursor:sd._fetching?"not-allowed":"pointer",fontFamily:"monospace",whiteSpace:"nowrap",opacity:sd._fetching?0.6:1}}>
                                  {sd._fetching?"⟳ Cargando…":"⬇ Fetch"}
                                </button>
                              </div>
                              {sd._fetchError&&<div style={{fontSize:10,color:"#FF4560",fontFamily:"monospace",marginTop:4}}>⚠ {sd._fetchError}</div>}
                            </div>

                            {/* Quality Gate — auto-filled by Fetch, editable manual */}
                            <div style={{marginBottom:10}}>
                              <label style={lbl}>Quality Gate</label>
                              <div style={{display:"flex",gap:6}}>
                                {["Passed","Failed"].map(opt=>(
                                  <button key={opt} onClick={()=>setSonarF(repoName,"qg",opt)}
                                    style={{flex:1,padding:"7px 0",borderRadius:6,border:`1px solid ${sd.qg===opt?(opt==="Passed"?"#00E676":"#FF4560"):"#1A2840"}`,background:sd.qg===opt?(opt==="Passed"?"#00E67615":"#FF456015"):"transparent",color:sd.qg===opt?(opt==="Passed"?"#00E676":"#FF4560"):"#4A6080",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"monospace"}}>
                                    {opt==="Passed"?"✓ Passed":"✗ Failed"}
                                  </button>
                                ))}
                              </div>
                            </div>

                            {/* Metrics grid — mirrors SonarQube dashboard */}
                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:8}}>
                              {/* Security */}
                              <div style={{background:"#0A1020",borderRadius:6,padding:"8px 10px"}}>
                                <div style={{fontSize:9,color:"#3A5070",fontFamily:"monospace",marginBottom:5,letterSpacing:1}}>SECURITY</div>
                                <div style={{display:"flex",gap:5,alignItems:"center"}}>
                                  <input style={{...inp,width:55,fontSize:12,textAlign:"center",padding:"4px 6px"}} value={sd.secIssues||""} onChange={e=>setSonarF(repoName,"secIssues",e.target.value)} placeholder="7"/>
                                  <span style={{fontSize:10,color:"#3A5070"}}>issues</span>
                                  <select style={{...inp,width:44,fontSize:12,padding:"4px 4px",textAlign:"center"}} value={sd.secRating||""} onChange={e=>setSonarF(repoName,"secRating",e.target.value)}>
                                    <option value="">-</option>
                                    {["A","B","C","D","E"].map(r=><option key={r} value={r}>{r}</option>)}
                                  </select>
                                </div>
                                {sd.secRating&&<div style={{fontSize:16,fontWeight:800,color:ratingColor(sd.secRating),marginTop:4}}>{sd.secRating}</div>}
                              </div>

                              {/* Reliability */}
                              <div style={{background:"#0A1020",borderRadius:6,padding:"8px 10px"}}>
                                <div style={{fontSize:9,color:"#3A5070",fontFamily:"monospace",marginBottom:5,letterSpacing:1}}>RELIABILITY</div>
                                <div style={{display:"flex",gap:5,alignItems:"center"}}>
                                  <input style={{...inp,width:55,fontSize:12,textAlign:"center",padding:"4px 6px"}} value={sd.relIssues||""} onChange={e=>setSonarF(repoName,"relIssues",e.target.value)} placeholder="41"/>
                                  <span style={{fontSize:10,color:"#3A5070"}}>issues</span>
                                  <select style={{...inp,width:44,fontSize:12,padding:"4px 4px"}} value={sd.relRating||""} onChange={e=>setSonarF(repoName,"relRating",e.target.value)}>
                                    <option value="">-</option>
                                    {["A","B","C","D","E"].map(r=><option key={r} value={r}>{r}</option>)}
                                  </select>
                                </div>
                                {sd.relRating&&<div style={{fontSize:16,fontWeight:800,color:ratingColor(sd.relRating),marginTop:4}}>{sd.relRating}</div>}
                              </div>

                              {/* Maintainability */}
                              <div style={{background:"#0A1020",borderRadius:6,padding:"8px 10px"}}>
                                <div style={{fontSize:9,color:"#3A5070",fontFamily:"monospace",marginBottom:5,letterSpacing:1}}>MAINTAINABILITY</div>
                                <div style={{display:"flex",gap:5,alignItems:"center"}}>
                                  <input style={{...inp,width:55,fontSize:12,textAlign:"center",padding:"4px 6px"}} value={sd.maintIssues||""} onChange={e=>setSonarF(repoName,"maintIssues",e.target.value)} placeholder="2.3k"/>
                                  <span style={{fontSize:10,color:"#3A5070"}}>issues</span>
                                  <select style={{...inp,width:44,fontSize:12,padding:"4px 4px"}} value={sd.maintRating||""} onChange={e=>setSonarF(repoName,"maintRating",e.target.value)}>
                                    <option value="">-</option>
                                    {["A","B","C","D","E"].map(r=><option key={r} value={r}>{r}</option>)}
                                  </select>
                                </div>
                                {sd.maintRating&&<div style={{fontSize:16,fontWeight:800,color:ratingColor(sd.maintRating),marginTop:4}}>{sd.maintRating}</div>}
                              </div>
                            </div>

                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:7,marginBottom:8}}>
                              {/* Coverage */}
                              <div style={{background:"#0A1020",borderRadius:6,padding:"8px 10px"}}>
                                <div style={{fontSize:9,color:"#3A5070",fontFamily:"monospace",marginBottom:5}}>COVERAGE %</div>
                                <input style={{...inp,fontSize:12,textAlign:"center",padding:"4px 6px"}} value={sd.coverage||""} onChange={e=>setSonarF(repoName,"coverage",e.target.value)} placeholder="0.0%"/>
                              </div>
                              {/* Duplications */}
                              <div style={{background:"#0A1020",borderRadius:6,padding:"8px 10px"}}>
                                <div style={{fontSize:9,color:"#3A5070",fontFamily:"monospace",marginBottom:5}}>DUPLICATIONS %</div>
                                <input style={{...inp,fontSize:12,textAlign:"center",padding:"4px 6px"}} value={sd.duplications||""} onChange={e=>setSonarF(repoName,"duplications",e.target.value)} placeholder="11.4%"/>
                              </div>
                              {/* Hotspots */}
                              <div style={{background:"#0A1020",borderRadius:6,padding:"8px 10px"}}>
                                <div style={{fontSize:9,color:"#3A5070",fontFamily:"monospace",marginBottom:5}}>HOTSPOTS</div>
                                <input style={{...inp,fontSize:12,textAlign:"center",padding:"4px 6px"}} value={sd.hotspots||""} onChange={e=>setSonarF(repoName,"hotspots",e.target.value)} placeholder="6"/>
                                <select style={{...inp,fontSize:10,padding:"3px 4px",marginTop:4}} value={sd.hotspotsStatus||""} onChange={e=>setSonarF(repoName,"hotspotsStatus",e.target.value)}>
                                  <option value="">Estado</option>
                                  <option value="Failed">Failed</option>
                                  <option value="Reviewed">Reviewed</option>
                                </select>
                              </div>
                              {/* Lines of Code */}
                              <div style={{background:"#0A1020",borderRadius:6,padding:"8px 10px"}}>
                                <div style={{fontSize:9,color:"#3A5070",fontFamily:"monospace",marginBottom:5}}>LINES OF CODE</div>
                                <input style={{...inp,fontSize:12,textAlign:"center",padding:"4px 6px"}} value={sd.loc||""} onChange={e=>setSonarF(repoName,"loc",e.target.value)} placeholder="45k"/>
                              </div>
                            </div>

                            {/* Version */}
                            <div>
                              <label style={lbl}>Versión SonarQube</label>
                              <input style={{...inp,fontSize:11}} value={sd.version||""} onChange={e=>setSonarF(repoName,"version",e.target.value)} placeholder="1.0.4-CNEV-374"/>
                            </div>

                            {/* Summary badges when data entered */}
                            {qgSet&&(
                              <div style={{marginTop:10,display:"flex",flexWrap:"wrap",gap:5}}>
                                <span style={{...sevBadge(qgOk?"Low":"High"),fontSize:9}}>QG: {sd.qg}</span>
                                {sd.secIssues&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:100,background:"#FF456015",color:"#FF4560",border:"1px solid #FF456030",fontFamily:"monospace"}}>🔒 Seg: {sd.secIssues} ({sd.secRating||"?"})</span>}
                                {sd.relIssues&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:100,background:"#FFB80015",color:"#FFB800",border:"1px solid #FFB80030",fontFamily:"monospace"}}>⚡ Rel: {sd.relIssues} ({sd.relRating||"?"})</span>}
                                {sd.hotspots&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:100,background:"#FF456015",color:"#FF7043",border:"1px solid #FF456030",fontFamily:"monospace"}}>🔥 Hotspots: {sd.hotspots} ({sd.hotspotsStatus||"?"})</span>}
                                {sd.coverage&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:100,background:"#00D4FF15",color:"#00D4FF",border:"1px solid #00D4FF30",fontFamily:"monospace"}}>📊 Coverage: {sd.coverage}</span>}
                                {sd.duplications&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:100,background:"#A78BFA15",color:"#A78BFA",border:"1px solid #A78BFA30",fontFamily:"monospace"}}>⧉ Dup: {sd.duplications}</span>}
                              </div>
                            )}
                          </div>
                        );
                      })()}
                    </div>

                    {/* Result bar */}
                    {isDone&&(
                      <div style={{marginTop:12,padding:"10px 14px",borderRadius:7,background:method==="pipeline"?"#00D4FF08":"#A78BFA08",border:`1px solid ${method==="pipeline"?"#00D4FF20":"#A78BFA20"}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:16}}>{method==="pipeline"?"⚡":"🔧"}</span>
                          <div>
                            <div style={{fontSize:12,fontWeight:700,color:method==="pipeline"?"#00D4FF":"#A78BFA"}}>
                              {method==="pipeline"?"Pipeline CI/CD confirmado — Jenkinsfile ✓ + Job Jenkins ✓":`Despliegue Manual${!repo.hasJF?" — Jenkinsfile ausente":" — Job Jenkins no encontrado"}`}
                            </div>
                            <div style={{fontSize:10,color:"#3A5070",marginTop:2}}>{method==="pipeline"?`Último build: ${repo.lastBuild} (${repo.lastBuildStatus})`:"Requiere ventana de mantenimiento y transferencia manual"}</div>
                          </div>
                        </div>
                        <div style={{fontSize:10,fontFamily:"monospace",color:"#3A5070"}}>
                          {sonarData[repoName]?.qg&&<span>QG: <span style={{color:sonarData[repoName]?.qg==="Passed"?"#00E676":"#FF4560",fontWeight:700}}>{sonarData[repoName]?.qg}</span></span>}
                          {sonarData[repoName]?.hotspots&&<span style={{marginLeft:8}}>🔥 {sonarData[repoName]?.hotspots} hotspots</span>}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
  );
}

// Props destructured from App state

                              {/* Situación Esperada */}
                              <div style={rowS}>
                                <div style={lblS}>Situación Esperada</div>

                              <div style={rowS}>
                                <div style={lblS}>Regla de Negocio</div>
                                <div style={valS}><textarea style={{...ta,minHeight:70,fontSize:11}} value={ov.reglaNegocio||""} onChange={e=>setVulnF(type,"reglaNegocio",e.target.value)} placeholder="Regla de negocio asociada a esta corrección…"/></div>

                              {/* Dependencias */}

                                <div style={lblS}>Dependencias</div>
                                <div style={valS}><textarea style={{...ta,minHeight:70,fontSize:11}} value={ov.depsTecnicas||""} onChange={e=>setVulnF(type,"depsTecnicas",e.target.value)} placeholder="Dependencias técnicas a actualizar o agregar…"/></div>
                              </div>
                              {/* Propuesta General */}
                              <div style={rowS}>
                                <div style={lblS}>Propuesta general</div>
                                <div style={valS}><textarea style={{...ta,minHeight:80,fontSize:11}} value={ov.propuestaGeneral||""} onChange={e=>setVulnF(type,"propuestaGeneral",e.target.value)} placeholder="Propuesta general de solución…"/></div>
                              </div>
                              {/* Propuesta de Solución + Repositorios */}
                              <div style={{...rowS,borderBottom:"none"}}>
                                <div style={lblS}>Propuesta de solución</div>
                                <div style={valS}>
                                  <textarea style={{...ta,minHeight:100,fontSize:11}} value={ov.solucion||""} onChange={e=>setVulnF(type,"solucion",e.target.value)} placeholder="Pasos detallados de remediación…"/>
                                  {repoUrls.length>0&&(
                                    <div style={{marginTop:8,padding:"8px 10px",background:"#0A1020",borderRadius:6,border:"1px solid #1A2840"}}>
                                      <div style={{fontSize:9,color:"#3A5070",fontFamily:"monospace",marginBottom:5,letterSpacing:1}}>REPOSITORIOS</div>
                                      {repoUrls.map((u,i)=>(
                                        <div key={i}><a href={u} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:"#00D4FF",fontFamily:"monospace",wordBreak:"break-all"}}>{u}</a></div>
                                      ))}
                                    </div>
                                  )}
                                </div>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                      <div style={{marginTop:16}}>
                        <div style={{fontSize:10,color:"#3A5070",fontFamily:"monospace",marginBottom:6}}>VISTA PREVIA DEL DOCUMENTO</div>
                        <div style={codeBox}>{genDT()}</div>
                      </div>
                    </div>
                  )}

                  {/* ── CHECKLIST ── */}
