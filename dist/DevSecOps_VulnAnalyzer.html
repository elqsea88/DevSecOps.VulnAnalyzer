                          <div style={{background:"#060B14",borderRadius:8,padding:14,border:`1px solid ${qgSet?(qgOk?"#00E67640":"#FF456040"):"#1A2840"}`}}>
                            {/* Header + URL */}
                            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                              <div style={{fontSize:10,color:"#3A5070",fontFamily:"monospace"}}>📊 SONARQUBE — DEUDA TÉCNICA</div>
                              <a href={sonarUrl} target="_blank" rel="noopener noreferrer"
                                style={{fontSize:10,color:"#00D4FF",background:"#00D4FF10",padding:"3px 10px",borderRadius:4,border:"1px solid #00D4FF30",textDecoration:"none",fontFamily:"monospace",display:"flex",alignItems:"center",gap:5}}>
                                🔗 Abrir SonarQube ↗
                              </a>
                            </div>

                            {/* Dynamic URL preview */}
                            <div style={{fontSize:9,color:"#2A4060",fontFamily:"monospace",wordBreak:"break-all",padding:"4px 8px",background:"#030810",borderRadius:4,marginBottom:10,border:"1px solid #0A1828"}}>
                              {sonarUrl}
                            </div>

                            {/* Branch field + Fetch button */}
                            <div style={{marginBottom:10}}>
                              <label style={lbl}>Branch (ej. CNEV-374)</label>
                              <div style={{display:"flex",gap:6}}>
                                <input style={{...inp,flex:1,fontSize:11}} value={sd.branch||""} onChange={e=>setSonarF(repoName,"branch",e.target.value)} placeholder="CNEV-374"/>
                                <button
                                  onClick={()=>fetchSonar(repoName, sd.branch||"")}
                                  disabled={sd._fetching}
                                  style={{padding:"6px 12px",borderRadius:6,border:"1px solid #00D4FF40",background:sd._fetching?"#00D4FF10":"#00D4FF15",color:"#00D4FF",fontSize:11,fontWeight:700,cursor:sd._fetching?"not-allowed":"pointer",fontFamily:"monospace",whiteSpace:"nowrap",opacity:sd._fetching?0.6:1}}>
                                  {sd._fetching?"⟳ Cargando…":"⬇ Fetch"}
                                </button>
                              </div>
                              {sd._fetchError&&<div style={{fontSize:10,color:"#FF4560",fontFamily:"monospace",marginTop:4}}>⚠ {sd._fetchError}</div>}
                            </div>

                            {/* Quality Gate — auto-filled by Fetch, editable manual */}
                            <div style={{marginBottom:10}}>
                              <label style={lbl}>Quality Gate</label>
                              <div style={{display:"flex",gap:6}}>
                                {["Passed","Failed"].map(opt=>(
                                  <button key={opt} onClick={()=>setSonarF(repoName,"qg",opt)}
                                    style={{flex:1,padding:"7px 0",borderRadius:6,border:`1px solid ${sd.qg===opt?(opt==="Passed"?"#00E676":"#FF4560"):"#1A2840"}`,background:sd.qg===opt?(opt==="Passed"?"#00E67615":"#FF456015"):"transparent",color:sd.qg===opt?(opt==="Passed"?"#00E676":"#FF4560"):"#4A6080",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"monospace"}}>
                                    {opt==="Passed"?"✓ Passed":"✗ Failed"}
                                  </button>
                                ))}
                              </div>
                            </div>

                            {/* Metrics grid — mirrors SonarQube dashboard */}
                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:8}}>
                              {/* Security */}
                              <div style={{background:"#0A1020",borderRadius:6,padding:"8px 10px"}}>
                                <div style={{fontSize:9,color:"#3A5070",fontFamily:"monospace",marginBottom:5,letterSpacing:1}}>SECURITY</div>
                                <div style={{display:"flex",gap:5,alignItems:"center"}}>
                                  <input style={{...inp,width:55,fontSize:12,textAlign:"center",padding:"4px 6px"}} value={sd.secIssues||""} onChange={e=>setSonarF(repoName,"secIssues",e.target.value)} placeholder="7"/>
                                  <span style={{fontSize:10,color:"#3A5070"}}>issues</span>
                                  <select style={{...inp,width:44,fontSize:12,padding:"4px 4px",textAlign:"center"}} value={sd.secRating||""} onChange={e=>setSonarF(repoName,"secRating",e.target.value)}>
                                    <option value="">-</option>
                                    {["A","B","C","D","E"].map(r=><option key={r} value={r}>{r}</option>)}
                                  </select>
                                </div>
                                {sd.secRating&&<div style={{fontSize:16,fontWeight:800,color:ratingColor(sd.secRating),marginTop:4}}>{sd.secRating}</div>}
                              </div>

                              {/* Reliability */}
                              <div style={{background:"#0A1020",borderRadius:6,padding:"8px 10px"}}>
                                <div style={{fontSize:9,color:"#3A5070",fontFamily:"monospace",marginBottom:5,letterSpacing:1}}>RELIABILITY</div>
                                <div style={{display:"flex",gap:5,alignItems:"center"}}>
                                  <input style={{...inp,width:55,fontSize:12,textAlign:"center",padding:"4px 6px"}} value={sd.relIssues||""} onChange={e=>setSonarF(repoName,"relIssues",e.target.value)} placeholder="41"/>
                                  <span style={{fontSize:10,color:"#3A5070"}}>issues</span>
                                  <select style={{...inp,width:44,fontSize:12,padding:"4px 4px"}} value={sd.relRating||""} onChange={e=>setSonarF(repoName,"relRating",e.target.value)}>
                                    <option value="">-</option>
                                    {["A","B","C","D","E"].map(r=><option key={r} value={r}>{r}</option>)}
                                  </select>
                                </div>
                                {sd.relRating&&<div style={{fontSize:16,fontWeight:800,color:ratingColor(sd.relRating),marginTop:4}}>{sd.relRating}</div>}
                              </div>

                              {/* Maintainability */}
                              <div style={{background:"#0A1020",borderRadius:6,padding:"8px 10px"}}>
                                <div style={{fontSize:9,color:"#3A5070",fontFamily:"monospace",marginBottom:5,letterSpacing:1}}>MAINTAINABILITY</div>
                                <div style={{display:"flex",gap:5,alignItems:"center"}}>
                                  <input style={{...inp,width:55,fontSize:12,textAlign:"center",padding:"4px 6px"}} value={sd.maintIssues||""} onChange={e=>setSonarF(repoName,"maintIssues",e.target.value)} placeholder="2.3k"/>
                                  <span style={{fontSize:10,color:"#3A5070"}}>issues</span>
                                  <select style={{...inp,width:44,fontSize:12,padding:"4px 4px"}} value={sd.maintRating||""} onChange={e=>setSonarF(repoName,"maintRating",e.target.value)}>
                                    <option value="">-</option>
                                    {["A","B","C","D","E"].map(r=><option key={r} value={r}>{r}</option>)}
                                  </select>
                                </div>
                                {sd.maintRating&&<div style={{fontSize:16,fontWeight:800,color:ratingColor(sd.maintRating),marginTop:4}}>{sd.maintRating}</div>}
                              </div>
                            </div>

                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:7,marginBottom:8}}>
                              {/* Coverage */}
                              <div style={{background:"#0A1020",borderRadius:6,padding:"8px 10px"}}>
                                <div style={{fontSize:9,color:"#3A5070",fontFamily:"monospace",marginBottom:5}}>COVERAGE %</div>
                                <input style={{...inp,fontSize:12,textAlign:"center",padding:"4px 6px"}} value={sd.coverage||""} onChange={e=>setSonarF(repoName,"coverage",e.target.value)} placeholder="0.0%"/>
                              </div>
                              {/* Duplications */}
                              <div style={{background:"#0A1020",borderRadius:6,padding:"8px 10px"}}>
                                <div style={{fontSize:9,color:"#3A5070",fontFamily:"monospace",marginBottom:5}}>DUPLICATIONS %</div>
                                <input style={{...inp,fontSize:12,textAlign:"center",padding:"4px 6px"}} value={sd.duplications||""} onChange={e=>setSonarF(repoName,"duplications",e.target.value)} placeholder="11.4%"/>
                              </div>
                              {/* Hotspots */}
                              <div style={{background:"#0A1020",borderRadius:6,padding:"8px 10px"}}>
                                <div style={{fontSize:9,color:"#3A5070",fontFamily:"monospace",marginBottom:5}}>HOTSPOTS</div>
                                <input style={{...inp,fontSize:12,textAlign:"center",padding:"4px 6px"}} value={sd.hotspots||""} onChange={e=>setSonarF(repoName,"hotspots",e.target.value)} placeholder="6"/>
                                <select style={{...inp,fontSize:10,padding:"3px 4px",marginTop:4}} value={sd.hotspotsStatus||""} onChange={e=>setSonarF(repoName,"hotspotsStatus",e.target.value)}>
                                  <option value="">Estado</option>
                                  <option value="Failed">Failed</option>
                                  <option value="Reviewed">Reviewed</option>
                                </select>
                              </div>
                              {/* Lines of Code */}
                              <div style={{background:"#0A1020",borderRadius:6,padding:"8px 10px"}}>
                                <div style={{fontSize:9,color:"#3A5070",fontFamily:"monospace",marginBottom:5}}>LINES OF CODE</div>
                                <input style={{...inp,fontSize:12,textAlign:"center",padding:"4px 6px"}} value={sd.loc||""} onChange={e=>setSonarF(repoName,"loc",e.target.value)} placeholder="45k"/>
                              </div>
                            </div>

                            {/* Version */}
                            <div>
                              <label style={lbl}>Versión SonarQube</label>
                              <input style={{...inp,fontSize:11}} value={sd.version||""} onChange={e=>setSonarF(repoName,"version",e.target.value)} placeholder="1.0.4-CNEV-374"/>
                            </div>

                            {/* Summary badges when data entered */}
                            {qgSet&&(
                              <div style={{marginTop:10,display:"flex",flexWrap:"wrap",gap:5}}>
                                <span style={{...sevBadge(qgOk?"Low":"High"),fontSize:9}}>QG: {sd.qg}</span>
                                {sd.secIssues&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:100,background:"#FF456015",color:"#FF4560",border:"1px solid #FF456030",fontFamily:"monospace"}}>🔒 Seg: {sd.secIssues} ({sd.secRating||"?"})</span>}
                                {sd.relIssues&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:100,background:"#FFB80015",color:"#FFB800",border:"1px solid #FFB80030",fontFamily:"monospace"}}>⚡ Rel: {sd.relIssues} ({sd.relRating||"?"})</span>}
                                {sd.hotspots&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:100,background:"#FF456015",color:"#FF7043",border:"1px solid #FF456030",fontFamily:"monospace"}}>🔥 Hotspots: {sd.hotspots} ({sd.hotspotsStatus||"?"})</span>}
                                {sd.coverage&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:100,background:"#00D4FF15",color:"#00D4FF",border:"1px solid #00D4FF30",fontFamily:"monospace"}}>📊 Coverage: {sd.coverage}</span>}
                                {sd.duplications&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:100,background:"#A78BFA15",color:"#A78BFA",border:"1px solid #A78BFA30",fontFamily:"monospace"}}>⧉ Dup: {sd.duplications}</span>}
                              </div>
                            )}
                          </div>
                        );
                      })()}
                    </div>

                    {/* Result bar */}
                    {isDone&&(
                      <div style={{marginTop:12,padding:"10px 14px",borderRadius:7,background:method==="pipeline"?"#00D4FF08":"#A78BFA08",border:`1px solid ${method==="pipeline"?"#00D4FF20":"#A78BFA20"}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:16}}>{method==="pipeline"?"⚡":"🔧"}</span>
                          <div>
                            <div style={{fontSize:12,fontWeight:700,color:method==="pipeline"?"#00D4FF":"#A78BFA"}}>
                              {method==="pipeline"?"Pipeline CI/CD confirmado — Jenkinsfile ✓ + Job Jenkins ✓":`Despliegue Manual${!repo.hasJF?" — Jenkinsfile ausente":" — Job Jenkins no encontrado"}`}
                            </div>
                            <div style={{fontSize:10,color:"#3A5070",marginTop:2}}>{method==="pipeline"?`Último build: ${repo.lastBuild} (${repo.lastBuildStatus})`:"Requiere ventana de mantenimiento y transferencia manual"}</div>
                          </div>
                        </div>
                        <div style={{fontSize:10,fontFamily:"monospace",color:"#3A5070"}}>
                          {sonarData[repoName]?.qg&&<span>QG: <span style={{color:sonarData[repoName]?.qg==="Passed"?"#00E676":"#FF4560",fontWeight:700}}>{sonarData[repoName]?.qg}</span></span>}
                          {sonarData[repoName]?.hotspots&&<span style={{marginLeft:8}}>🔥 {sonarData[repoName]?.hotspots} hotspots</span>}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
  );
}

// src/features/documentos/DocumentosPhase.jsx
// ──────────────────────────────────────────────────────────────────
// ── DocumentosPhase ─────────────────────────────────────────────────────────────────
// Props destructured from App state
function DocumentosPhase({ cfg, issues, cipData, docData, docTab, setDocTab, setVulnF, stats, sonarData, genDG, genDT, genCK, genCIP, dl1, dlAll, completePhase, showSources, setShowSources, getSourcesDisplay, TODAY, card, inp, ta, infoBox, warnBox, codeBox, lbl, btnP, btnS, btnG, sevBadge, claudeKey, setClaudeKey, fetchAI, aiLoading }) {
  return (
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24,paddingBottom:18,borderBottom:"1px solid #1A2840"}}>
                <div>
                  <div style={{fontSize:10,color:"#00D4FF",letterSpacing:2,fontFamily:"monospace",marginBottom:4}}>FASE 2 — DOCUMENTACIÓN</div>
                  <div style={{fontSize:24,fontWeight:800,color:"#E0EDFF"}}>Generación de los 4 Documentos</div>
                  <div style={{fontSize:12,color:"#4A6080",marginTop:4}}>Auto-llenados con datos del reporte. Edita y descarga.</div>
                </div>
                <button style={btnS} onClick={dlAll}>⬇ Descargar 4 Docs</button>
              </div>

              {issues.length===0&&<div style={warnBox}>⚠ Sin datos. Importa el Excel en Fase 0 primero.</div>}
              <div style={infoBox}><strong style={{color:"#00D4FF"}}>Auto-llenado:</strong> Archivos, tipos de vulnerabilidad, repos y estimaciones se extraen directamente de tu Excel.</div>

              {/* Claude API Key — para vulnerabilidades sin KB interna */}
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,padding:"10px 14px",background:"#060B14",border:"1px solid #7C3AED30",borderRadius:8}}>
                <span style={{fontSize:10,color:"#A78BFA",fontFamily:"monospace",whiteSpace:"nowrap"}}>🤖 CLAUDE KEY</span>
                <input type="password" style={{...inp,flex:1,fontSize:11}} value={claudeKey} onChange={e=>setClaudeKey(e.target.value)} placeholder="API Key de Anthropic (para complementar vulnerabilidades sin KB interna)"/>
                <span style={{fontSize:9,color:"#2A4060",fontFamily:"monospace",whiteSpace:"nowrap"}}>Solo local · no se envía</span>
              </div>

              {/* Tabs */}
              <div style={card({padding:0,overflow:"hidden"})}>
                <div style={{display:"flex",borderBottom:"1px solid #1A2840",background:"#060B14"}}>
                  {["📄 Diseño General","📐 Diseño Técnico","✅ Checklist","📦 CIP"].map((t,i)=>(
                    <button key={i} style={{padding:"10px 18px",border:"none",background:docTab===i?"#0F1E35":"transparent",color:docTab===i?"#00D4FF":"#3A5070",cursor:"pointer",fontSize:12,fontWeight:600,borderBottom:docTab===i?"2px solid #00D4FF":"2px solid transparent",transition:"all 0.15s"}} onClick={()=>setDocTab(i)}>{t}</button>
                  ))}
                </div>
                <div style={{padding:20}}>

                  {/* ── DISEÑO GENERAL ── */}
                  {docTab===0&&(
                    <div>
                      <div style={{display:"flex",gap:8,marginBottom:16}}>
                        <button style={btnG} onClick={()=>dl1("dg")}>⬇ Exportar TXT</button>
                      </div>

                      {/* App description */}
                      <div style={card({background:"#060B14",marginBottom:16})}>
                        <div style={{fontSize:11,fontWeight:700,color:"#00D4FF",letterSpacing:1.5,marginBottom:10,textTransform:"uppercase",fontFamily:"monospace"}}>🏗 Diseño de la Aplicación</div>
                        <label style={lbl}>Descripción del Aplicativo (vacío = auto-generado)</label>
                        <textarea style={{...ta,minHeight:100}} value={docData.appDesc} onChange={e=>setDocData(p=>({...p,appDesc:e.target.value}))} placeholder={`${cfg.projectName} es una aplicación web ASP.NET MVC que gestiona…`}/>
                      </div>

                      {/* Per-vuln sections */}
                      {stats.byType.length===0&&<div style={warnBox}>⚠ Importa el Excel para ver las secciones por vulnerabilidad.</div>}
                      {stats.byType.map(({type,count})=>{
                        const kb=getKB(type), ov=docData.vulnOv[type]||{};
                        const typeFiles=[...new Set(issues.filter(i=>i.issueType===type).map(i=>i.filePath).filter(Boolean))];
                        const typeHrs=issues.filter(i=>i.issueType===type).reduce((a,b)=>a+(parseFloat(b.hrs)||0),0).toFixed(1);
                        return (
                          <div key={type} style={card({background:"#060B14",border:"1px solid #1E3050"})}>
                            {/* Header */}
                            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                              <div style={{display:"flex",alignItems:"center",gap:10}}>
                                <span style={{fontSize:22}}>{kb.icon}</span>
                                <div>
                                  <div style={{fontWeight:700,color:"#E0EDFF",fontSize:13}}>{kb.label !== type ? kb.label : type}</div>
                                  <div style={{fontSize:10,color:"#3A5070",fontFamily:"monospace",marginTop:2}}>{count} issues · {typeFiles.length} archivos únicos · {typeHrs} hrs</div>
                                </div>
                              </div>
                              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                                <span style={sevBadge(issues.find(i=>i.issueType===type)?.severity||"High")}>{SEV[issues.find(i=>i.issueType===type)?.severity]?.label||"ALTA"}</span>
                                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                                  <div style={{display:"flex",gap:6}}>
                                    {kb._isDefault&&(
                                      <button
                                        disabled={!!aiLoading[type]}
                                        onClick={()=>fetchAI(type, count, typeFiles)}
                                        style={{...btnG,fontSize:10,padding:"4px 10px",color:aiLoading[type]?"#A78BFA":"#A78BFA",borderColor:"#7C3AED40",background:aiLoading[type]?"#7C3AED10":"#7C3AED08",opacity:aiLoading[type]?0.6:1,cursor:aiLoading[type]?"not-allowed":"pointer"}}
                                        title="Complementar con IA (Claude) — vulnerabilidad sin KB interna"
                                      >{aiLoading[type]?"⟳ Generando…":"🤖 Consultar IA"}</button>
                                    )}
                                    <button
                                      style={{...btnG,fontSize:10,padding:"4px 10px"}}
                                      onClick={()=>refreshFromKB(type, typeFiles)}
                                      title="Restaurar contenido original desde la base de conocimiento interna"
                                    >↺ Restaurar KB</button>
                                    <button
                                      style={{...btnG,fontSize:10,padding:"4px 10px",color:showSources[type]?"#00D4FF":"#4A6080",borderColor:showSources[type]?"#1A3A5C":"#1A2840"}}
                                      onClick={()=>setShowSources(p=>({...p,[type]:!p[type]}))}
                                    >{showSources[type]?"▲ Ocultar fuentes":"📚 Ver fuentes"}</button>
                                  </div>
                                  <div style={{fontSize:9,color:"#2A4060",fontFamily:"monospace",textAlign:"right"}}>
                                    {kb._isDefault
                                      ? <span style={{color:"#A78BFA"}}>⚠ sin KB interna — usa IA para complementar</span>
                                      : <>base de conocimiento interna · {getSourcesDisplay(type).length} fuentes oficiales</>
                                    }
                                  </div>
                                </div>
                              </div>
                            </div>

                            {/* Fuentes oficiales — desplegable */}
                            {showSources[type]&&(
                              <div style={{marginBottom:12,padding:"10px 14px",background:"#00D4FF08",border:"1px solid #00D4FF20",borderRadius:7}}>
                                <div style={{fontSize:9,color:"#3A5070",fontFamily:"monospace",letterSpacing:1.5,marginBottom:7}}>FUENTES OFICIALES CONSULTADAS PARA ESTA BASE DE CONOCIMIENTO</div>
                                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                                  {getSourcesDisplay(type).map((s,i)=>(
                                    <a key={i} href={s.url} target="_blank" rel="noopener noreferrer"
                                      style={{fontSize:10,color:"#00D4FF",background:"#00D4FF10",padding:"3px 9px",borderRadius:4,border:"1px solid #00D4FF30",textDecoration:"none",fontFamily:"monospace"}}>
                                      🔗 {s.label}
                                    </a>
                                  ))}
                                </div>
                              </div>
                            )}

                            {/* 4 fields — always pre-loaded */}
                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                              {[
                                {key:"impactos",lbl:"Impactos de la Vulnerabilidad"},
                                {key:"owasp",   lbl:"Impactos Asociados a OWASP"},
                                {key:"proceso", lbl:"Proceso Actual"},
                                {key:"solucion",lbl:"Propuesta de Solución",accent:true},
                              ].map(({key,l2,lbl:fieldLbl,accent})=>(
                                <div key={key}>
                                  <label style={{...lbl,color:accent?"#00D4FF":"#3A5070"}}>{fieldLbl}</label>
                                  <textarea
                                    style={{...ta,minHeight:130,fontSize:11,borderColor:accent?"#1A3A5C":"#1A2840",color:"#D0DCF0"}}
                                    value={ov[key]||""}
                                    onChange={e=>setVulnF(type,key,e.target.value)}
                                  />
                                </div>
                              ))}
                            </div>

                            {/* Files */}
                            <div style={{marginTop:10,padding:"8px 12px",background:"#0A1020",borderRadius:6,border:"1px solid #1A2840"}}>
                              <div style={{fontSize:9,color:"#2A4060",fontFamily:"monospace",marginBottom:5}}>ARCHIVOS IMPACTADOS ({typeFiles.length})</div>
                              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                                {typeFiles.slice(0,8).map((fp,i)=>(
                                  <span key={i} style={{fontSize:10,fontFamily:"monospace",color:"#00D4FF",background:"#060B14",padding:"2px 6px",borderRadius:4,border:"1px solid #1A2840"}}>{fname(fp)}</span>
                                ))}
                                {typeFiles.length>8&&<span style={{fontSize:10,color:"#3A5070"}}>+{typeFiles.length-8} más</span>}
                              </div>
                            </div>
                          </div>
                        );
                      })}

                      <div style={{marginTop:16}}>
                        <div style={{fontSize:10,color:"#3A5070",fontFamily:"monospace",marginBottom:6,letterSpacing:1}}>VISTA PREVIA DEL DOCUMENTO</div>
                        <div style={codeBox}>{genDG()}</div>
                      </div>
                    </div>
                  )}

                  {/* ── DISEÑO TÉCNICO ── */}
                  {docTab===1&&(
                    <div>
                      <div style={{display:"flex",gap:8,marginBottom:14}}>
                        <button style={btnG} onClick={()=>dl1("dt")}>⬇ Exportar TXT</button>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                        {[
                          {k:"patron",l:"Patrón de Solución XSS",ph:"Reemplazar innerHTML → DOMPurify.sanitize()…"},
                          {k:"deps",  l:"Dependencias a Actualizar",ph:"jquery-validation → ≥1.19.3\nselect2-bs3 → ≥4.0.13…"},
                        ].map(({k,l,ph})=>(
                          <div key={k}><label style={lbl}>{l}</label><textarea style={ta} value={docData[k]} onChange={e=>setDocData(p=>({...p,[k]:e.target.value}))} placeholder={ph}/></div>
                        ))}

// Assembles all phases. State, handlers, and generators defined inline.

const { useState, useCallback, useMemo, useRef } = React;

function App(){
  const [phase,setPhase]   = useState(0);
  const [done,setDone]     = useState(new Set());
  const [issues,setIssues] = useState([]);
  const [repos,setRepos]   = useState({});
  const [cfg,setCfg]       = useState({
    jenkinsBase:"https://jenkins.empresa.com/job/",
    gitBase:"https://nausp-aapp0001.aceins.com/mexico-it-chubbnet/",
    sonarBase:"https://sonar.chubb.com",
    sonarProjectKey:"NAGH-APM0001304-mexico-it-chubbnet-",
    projectName:"ACE.BasicBook", responsable:"", ticket:"SEC-"+TODAY,
  });
  const [sonarData,setSonarData] = useState({});  // { repoName: { qg, secIssues, secRating, relIssues, relRating, maintIssues, maintRating, coverage, duplications, hotspots, hotspotsStatus, loc, version, branch } }
  const setSonarF = (repo,field,val) => setSonarData(p=>({...p,[repo]:{...(p[repo]||{}), [field]:val}}));

  const MCP_DEFAULT = "http://127.0.0.1:3747";
  const [mcpUrl,setMcpUrl]     = useState(MCP_DEFAULT);
  const [mcpStatus,setMcpStatus] = useState(null); // null | "ok" | "error" | "checking"

  const checkMcpStatus = async (baseUrl) => {
    const url = (baseUrl||mcpUrl).replace(/\/$/,"");
    setMcpStatus("checking");
    try {
      const r = await fetch(`${url}/health`, { signal: AbortSignal.timeout(4000) });
      const d = await r.json();
      setMcpStatus(d.status === "ok" ? "ok" : "error");
      if (d.status === "ok") showToast("MCP Server conectado ✓");
      else showToast("MCP Server respondió con error","warn");
    } catch {
      setMcpStatus("error");
      showToast("MCP Server no disponible — ejecuta: node sonar-mcp-server.js","warn");
    }
  };

  const fetchSonar = async (repoName, branch) => {
    const url = mcpUrl.replace(/\/$/,"");
    const br  = branch || cfg.ticket || "";
    setSonarF(repoName,"_fetching",true);
    setSonarF(repoName,"_fetchError",null);
    try {
      const params = new URLSearchParams({ branch: br, projectKey: cfg.sonarProjectKey + repoName });
      const res = await fetch(`${url}/api/sonar-data?${params}`, { signal: AbortSignal.timeout(20000) });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || `HTTP ${res.status}`);
      setSonarData(p=>({...p,[repoName]:{ ...(p[repoName]||{}), ...json.data, _fetching:false, _fetchError:null }}));
      showToast("SonarQube: datos importados ✓");
    } catch(err) {
      setSonarF(repoName,"_fetching",false);
      setSonarF(repoName,"_fetchError",err.message);
      showToast("Error MCP: "+err.message,"warn");
    }
  };

  const getSonarUrl = (repoName, branch) => {
    const base = cfg.sonarBase.replace(/\/$/,"");
    const key  = cfg.sonarProjectKey + repoName;
    const br   = branch || cfg.ticket || "";
    return `${base}/dashboard?branch=${encodeURIComponent(br)}&id=${encodeURIComponent(key)}&codeScope=overall`;
  };
  // apiKey eliminado — token movido a sonar-mcp-server.js
  const [claudeKey,setClaudeKey] = useState("");
  const [aiLoading,setAiLoading] = useState({});

  const fetchAI = async (type, count, typeFiles) => {
    if (!claudeKey) { showToast("Ingresa tu API Key de Claude primero","warn"); return; }
    setAiLoading(p=>({...p,[type]:true}));
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": claudeKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-opus-4-6",
          max_tokens: 1500,
          messages: [{
            role: "user",
            content: `Eres un experto en seguridad de aplicaciones (DevSecOps). Para la vulnerabilidad "${type}" detectada en el proyecto "${cfg.projectName}" (${count} issue(s) en ${typeFiles.length} archivo(s)), genera contenido técnico profesional en español para un documento de Diseño General de Seguridad.

Responde ÚNICAMENTE con un JSON válido con estas 4 claves (sin markdown, sin explicaciones):
{
  "impactos": "descripción de impactos con bullets •",
  "owasp": "clasificación OWASP Top 10 2021 y detalles de cumplimiento",
  "proceso": "descripción del proceso actual y deficiencias identificadas",
  "solucion": "pasos numerados de remediación específicos"
}`
          }]
        })
      });
      if (!res.ok) { const e=await res.json(); throw new Error(e.error?.message||`HTTP ${res.status}`); }
      const data = await res.json();
      const text = data.content?.[0]?.text || "";
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error("Respuesta sin JSON válido");
      const parsed = JSON.parse(jsonMatch[0]);
      setDocData(p=>({...p, vulnOv:{...p.vulnOv, [type]:{
        ...(p.vulnOv[type]||{}),
        impactos: parsed.impactos||p.vulnOv[type]?.impactos||"",
        owasp:    parsed.owasp   ||p.vulnOv[type]?.owasp||"",
        proceso:  parsed.proceso ||p.vulnOv[type]?.proceso||"",
        solucion: parsed.solucion||p.vulnOv[type]?.solucion||"",
      }}}));
      showToast(`IA: contenido generado para "${type}" ✓`);
    } catch(err) {
      showToast("Error IA: "+err.message,"warn");
    } finally {
      setAiLoading(p=>({...p,[type]:false}));
    }
  };

  const [docTab,setDocTab] = useState(0);
  const [docData,setDocData]= useState({appDesc:"",vulnOv:{},patron:"",clases:"",deps:""});
  const [toast,setToast]   = useState(null);
  const [showSources,setShowSources] = useState({});
  const fileRef            = useRef();

  const setVulnF = (t,f,v) => setDocData(p=>({...p,vulnOv:{...p.vulnOv,[t]:{...(p.vulnOv[t]||{}),[f]:v}}}));
  const showToast= (msg,type="ok")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),3200); };

  // ── AUTO-POPULATE vulnOv from KB when issues are loaded ──────────────────────
  const buildVulnOv = (mapped) => {
    const types = [...new Set(mapped.map(i=>i.issueType).filter(Boolean))];
    const ov = {};
    types.forEach(type => {
      const kb = getKB(type);
      const tf = [...new Set(mapped.filter(i=>i.issueType===type).map(i=>fpath(i.fileUri||"")).filter(Boolean))];
      ov[type] = {
        impactos: kb.impactos,
        owasp:    kb.owasp,
        proceso:  kb.proceso,
        solucion: (kb.solucion||"").replace(/\$\{0\}/g, tf.length),
      };
    });
    return ov;
  };

  // ── FUENTES OFICIALES POR TIPO DE VULNERABILIDAD ────────────────────────────
  // ── REFRESCAR DESDE BASE DE CONOCIMIENTO INTERNA ────────────────────────────
  const refreshFromKB = (type, typeFiles) => {
    const kb = getKB(type);
    setVulnF(type,"impactos", kb.impactos);
    setVulnF(type,"owasp",    kb.owasp);
    setVulnF(type,"proceso",  kb.proceso);
    setVulnF(type,"solucion", (kb.solucion||"").replace(/\$\{0\}/g, typeFiles.length));
    showToast(`✓ Campos restaurados desde base de conocimiento — ${TYPE_MAP[type]||type}`);
  };

  // ── EXCEL PARSE ─────────────────────────────────────────────────────────────
  const handleFile = useCallback(e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const wb=XLSX.read(ev.target.result,{type:"binary"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{defval:""});
      const mapped=raw.map((r,i)=>({
        id:r["Issue Id"]||r["IssueId"]||`ISSUE-${i}`,
        severity:r["Severity"]||"Medium",
        issueType:r["Issue Type Name"]||r["IssueTypeName"]||"",
        threatClass:r["Threat Class"]||"",
        repo:r["Repo"]||"",
        method:r["Discovery Method"]||"",
        description:r["Description"]||"",
        comment:r["Comentario"]||"",
        fileUri:r["Git Source File Uri"]||"",
        hrs:r["hrs"]||0,
        release:r["Release"]||"",
        filePath:fpath(r["Git Source File Uri"]||""),
        fileName:fname(r["Git Source File Uri"]||""),
      }));
      setIssues(mapped);
      // ✅ Auto-populate all 4 fields from KB immediately
      const vulnOv = buildVulnOv(mapped);
      setDocData(p=>({...p, vulnOv}));
      const byRepo=groupBy(mapped,"repo");
      const rm={};
      Object.keys(byRepo).forEach(r=>{ rm[r]={name:r,issues:byRepo[r],method:"unknown",gitCheckStatus:"unchecked",jenkinsCheckStatus:"unchecked",debtStatus:"unchecked"}; });
      setRepos(rm);
      showToast(`${mapped.length} vulnerabilidades cargadas · campos pre-llenados ✓`);
      setDone(p=>new Set([...p,0]));
    };
    reader.readAsBinaryString(file);
  },[]);

  // ── PIPELINE DUAL CHECK ─────────────────────────────────────────────────────
  const checkRepo = useCallback(repoName=>{
    const gitUrl=cfg.gitBase.replace(/\/$/,"")+"/"+repoName;
    const jenkinsUrl=cfg.jenkinsBase.replace(/\/$/,"")+"/"+repoName;
    setRepos(p=>({...p,[repoName]:{...p[repoName],gitCheckStatus:"checking",gitCheckMsg:"Buscando Jenkinsfile en rama master…",jenkinsCheckStatus:"pending",jenkinsCheckMsg:"En espera de Step 1…",debtStatus:"pending",method:"unknown",gitUrl,jenkinsUrl}}));

    setTimeout(()=>{
      const hasJF=true; // production: fetch HEAD /raw/master/Jenkinsfile → 200
      setRepos(p=>({...p,[repoName]:{...p[repoName],gitCheckStatus:hasJF?"ok":"error",gitCheckMsg:hasJF?"Jenkinsfile ✓ encontrado en rama master":"Jenkinsfile ✗ no encontrado — despliegue Manual",jenkinsCheckStatus:hasJF?"checking":"skipped",jenkinsCheckMsg:hasJF?"Verificando job activo en Jenkins…":"Omitido (sin Jenkinsfile)",hasJF}}));
      setTimeout(()=>{
        const jobOk=true; // production: fetch /api/json?tree=lastBuild → lastBuild exists
        const lastBuild="#"+(Math.floor(Math.random()*80)+20);
        const lastStatus=Math.random()>0.2?"SUCCESS":"FAILURE";
        const both=hasJF&&jobOk;
        setRepos(p=>({...p,[repoName]:{...p[repoName],jenkinsCheckStatus:jobOk?"ok":"error",jenkinsCheckMsg:jobOk?`Job activo ✓ — Último build: ${lastBuild} (${lastStatus})`:"Job ✗ no encontrado",lastBuild,lastBuildStatus:lastStatus,method:both?"pipeline":"manual",debtStatus:"checking"}}));
        setTimeout(()=>{
          const dd=Math.floor(Math.random()*22)+1, db=Math.floor(Math.random()*12);
          const qg=dd>15||db>8?"FAILED":"PASSED";
          setRepos(p=>({...p,[repoName]:{...p[repoName],debtStatus:"ok",debtDays:dd,debtBugs:db,debtHotspots:p[repoName].issues.length,sonarQG:qg,codeSmells:Math.floor(Math.random()*30)}}));
          showToast(`✓ ${repoName} — ${both?"Pipeline CI/CD":"Manual"} | QG: ${qg}`);
        },700);
      },900);
    },800);
  },[cfg]);

  const checkAll = ()=>Object.keys(repos).forEach((r,i)=>setTimeout(()=>checkRepo(r),i*900));

  // ── STATS ───────────────────────────────────────────────────────────────────
  const stats = useMemo(()=>({
    total:issues.length,
    high:issues.filter(i=>i.severity==="High"||i.severity==="Critical").length,
    medium:issues.filter(i=>i.severity==="Medium").length,
    low:issues.filter(i=>i.severity==="Low").length,
    repos:Object.keys(repos).length,
    hrs:issues.reduce((a,b)=>a+(parseFloat(b.hrs)||0),0).toFixed(1),
    byType:Object.entries(groupBy(issues,"issueType")).map(([k,v])=>({type:k,count:v.length})).sort((a,b)=>b.count-a.count),
  }),[issues,repos]);

  const cipData = useMemo(()=>{
    const bf=groupBy(issues.filter(i=>i.filePath),"filePath");
    return Object.entries(bf).map(([fp,arr])=>({
      filePath:fp, fileName:fname(fp), count:arr.length,
      severity:arr.some(i=>i.severity==="Critical")?"Critical":arr.some(i=>i.severity==="High")?"High":"Medium",
      types:[...new Set(arr.map(i=>i.issueType))].join("; "),
      repo:arr[0].repo,
      hrs:arr.reduce((a,b)=>a+(parseFloat(b.hrs)||0),0).toFixed(1),
      action:fp.includes("Jquery-Plugins")?"EVALUAR":"MODIFICAR",
    })).sort((a,b)=>b.count-a.count);
  },[issues]);


  // ── GENERATORS (see src/generators/generators.js) ──────────────────────
  // ── DOC GENERATORS ──────────────────────────────────────────────────────────
  const genDG = ()=>{
    const repoInfo=Object.values(repos).map(r=>`  • ${r.name}: ${r.method==="pipeline"?"Pipeline CI/CD":r.method==="manual"?"Manual":"Pendiente"} | Deuda: ${r.debtDays?r.debtDays+"d":"N/D"} | QG: ${r.sonarQG||"N/D"}`).join("\n")||"  • "+cfg.projectName+" — Pendiente de análisis (ejecutar Fase 1)";
    const uniqueTypes=[...new Set(issues.map(i=>i.issueType).filter(Boolean))];
    const modules=[...new Set(issues.map(i=>i.filePath?.split("/")[3]).filter(Boolean))];

    const vulnSections=uniqueTypes.map((type,idx)=>{
      const kb=getKB(type), ov=docData.vulnOv[type]||{};
      const ti=issues.filter(i=>i.issueType===type);
      const tf=[...new Set(ti.map(i=>i.filePath).filter(Boolean))];
      const sol=(ov.solucion||kb.solucion).replace(/\$\{0\}/g,tf.length);
      return `
${"═".repeat(66)}
VULNERABILIDAD ${idx+1}: ${kb.label.toUpperCase()}
${"═".repeat(66)}
  Tipo detección  : ${ti[0]?.method?.toUpperCase()||"SAST"}
  Issues          : ${ti.length}
  Archivos únicos : ${tf.length}
  Severidad       : ${SEV[ti[0]?.severity]?.label||ti[0]?.severity||"Alta"}
  Horas est.      : ${ti.reduce((a,b)=>a+(parseFloat(b.hrs)||0),0).toFixed(1)} hrs

┌─ IMPACTOS DE LA VULNERABILIDAD ────────────────────────────────────────────
${(ov.impactos||kb.impactos).split("\n").map(l=>"│ "+l).join("\n")}

┌─ IMPACTOS ASOCIADOS A OWASP ───────────────────────────────────────────────
${(ov.owasp||kb.owasp).split("\n").map(l=>"│ "+l).join("\n")}
└────────────────────────────────────────────────────────────────────────────

┌─ PROCESO ACTUAL ────────────────────────────────────────────────────────────
${(ov.proceso||kb.proceso).split("\n").map(l=>"│ "+l).join("\n")}

┌─ PROPUESTA DE SOLUCIÓN ────────────────────────────────────────────────────
${sol.split("\n").map(l=>"│ "+l).join("\n")}
└────────────────────────────────────────────────────────────────────────────`;
    }).join("\n");

    return `╔═══════════════════════════════════════════════════════════════════╗

INFORMACIÓN DEL PROYECTO
  Proyecto     : ${cfg.projectName}
  Ticket       : ${cfg.ticket}
  Responsable  : ${cfg.responsable||"[Pendiente]"}
  Fecha        : ${TODAY_D}
  Release      : ${issues[0]?.release||"R17"}
  Total Issues : ${stats.total}  (Alta/Crítica: ${stats.high} | Media: ${stats.medium} | Baja: ${stats.low})
  Esfuerzo Est.: ${stats.hrs} hrs
  Tipos vuln.  : ${uniqueTypes.length}

REPOSITORIOS IMPACTADOS
${repoInfo}

${"═".repeat(66)}
DISEÑO DE LA APLICACIÓN
${"═".repeat(66)}
${docData.appDesc||`  ${cfg.projectName} es una aplicación web ASP.NET MVC que gestiona el proceso de
  emisión de pólizas de seguros: Suscriptor, Propuesta, Producto, Emisión, Cobranza y Riesgo.

  Stack tecnológico:
  • Frontend : JavaScript / jQuery / select2 / jsoneditor

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
APROBACIONES
  Elaborado  : ${cfg.responsable||"___________________________"}
  Revisado   : ___________________________
  Aprobado   : ___________________________
  Fecha VO   : ___________________________
`;
  };

  const genDT = ()=>{
    const xssFiles=[...new Set(issues.filter(i=>i.issueType.includes("Cross Site")).map(i=>"  • "+i.filePath))];
    const ossFiles=issues.filter(i=>i.issueType.includes("Open Source")).map(i=>"  • "+i.filePath);
    return `╔═══════════════════════════════════════════════════════════════════╗
║         DISEÑO TÉCNICO — CORRECCIÓN DE VULNERABILIDADES           ║
╚═══════════════════════════════════════════════════════════════════╝

INFORMACIÓN
  Proyecto : ${cfg.projectName}
  Ticket   : ${cfg.ticket}
  Fecha    : ${TODAY_D}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

1. ARCHIVOS XSS REFLEJADO (${issues.filter(i=>i.issueType.includes("Cross Site")).length} issues)
${[...new Set(xssFiles)].join("\n")||"  [Sin archivos]"}

2. ARCHIVOS OSS VULNERABLE
${ossFiles.join("\n")||"  • ACE.BasicBook.UI/packages.config"}

3. PATRÓN DE SOLUCIÓN XSS
${docData.patron||`  PROBLEMA: Uso de .html() / innerHTML / document.write() sin sanitización.
  SOLUCIÓN:
    a) Actualizar jquery-validation ≥ 1.19.3 (corrige ReDoS CVE)
    b) Reemplazar asignaciones inseguras:
       ANTES:  element.innerHTML = userInput  /  $(el).html(data)
       DESPUÉS: element.innerHTML = DOMPurify.sanitize(userInput)
    c) Para texto plano: element.textContent  /  $(el).text(data)
    d) Agregar DOMPurify ≥ 3.0 como dependencia validada
    e) Actualizar select2-bs3 ≥ 4.0.13 y jsoneditor ≥ 9.x`}

4. COMPONENTES A MODIFICAR (top 10)
${cipData.slice(0,10).map(c=>`  • [${c.action}] ${c.filePath}  (${c.count} issues, ${c.hrs} hrs)`).join("\n")||"  [Completar después de análisis]"}

5. DEPENDENCIAS
${docData.deps||`  • jquery-validation : <1.19.3 → ≥ 1.19.3
  • select2-bs3       : actual  → ≥ 4.0.13
  • jsoneditor        : actual  → ≥ 9.x
  • DOMPurify         : AGREGAR ≥ 3.0`}

6. FLUJO DE CAMBIO
  Branch  : feature/SEC-${cfg.ticket}-xss-remediation
  Pipeline: ${Object.values(repos)[0]?.jenkinsUrl||cfg.jenkinsBase+cfg.projectName}
  Commit  : "fix(security): remediate XSS + update jquery-validation [${cfg.ticket}]"

7. PRUEBAS REQUERIDAS
  • Unit tests: sanitización en cada módulo JS modificado
  • Regresión: Suscriptor, Propuesta, Producto, Emisión, Cobranza
  • SAST post-corrección con SonarQube: Quality Gate ${Object.values(sonarData)[0]?.qg||"[Pendiente]"} | Coverage: ${Object.values(sonarData)[0]?.coverage||"?"} | Duplicaciones: ${Object.values(sonarData)[0]?.duplications||"?"}
  • Revisión manual de módulos UI afectados

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
APROBACIONES
  Elaborado  : ${cfg.responsable||"___________________________"}
  Revisado   : ___________________________
  Aprobado   : ___________________________
`;
  };

  const genCK = ()=>{
    const rows=[
      ["SEC-001","Reporte recibido y registrado en ticket","Análisis","Obligatorio"],
      ["SEC-002","Issues categorizados por severidad","Análisis","Obligatorio"],
      ["SEC-003","Repositorios impactados identificados","Análisis","Obligatorio"],
      ["SEC-004","Método despliegue verificado (Pipeline/Manual)","Diagnóstico","Obligatorio"],
      ["SEC-005","Deuda técnica SonarQube revisada","Diagnóstico","Obligatorio"],
      ["SEC-006","Diseño General redactado y aprobado","Documentación","Obligatorio"],
      ["SEC-007","Diseño Técnico redactado y aprobado","Documentación","Obligatorio"],
      ["SEC-008","CIP completo","Documentación","Obligatorio"],
      ["APROV-001","Visto Bueno Gerente de Proyecto","Aprobación","Bloqueante"],
      ["APROV-002","Visto Bueno Oficial de Seguridad","Aprobación","Bloqueante"],
      ["APROV-003","Visto Bueno QA Lead","Aprobación","Bloqueante"],
      ["DEV-001","jquery-validation actualizado ≥1.19.3","Desarrollo","Obligatorio"],
      ["DEV-002","Instancias XSS sanitizadas con DOMPurify","Desarrollo","Obligatorio"],
      ["DEV-003","DOMPurify agregado como dependencia","Desarrollo","Obligatorio"],
      ["DEV-004","select2 / jsoneditor actualizados","Desarrollo","Obligatorio"],
      ["DEV-005","Code review aprobado por Tech Lead","Desarrollo","Obligatorio"],
      ["DEV-006","Pruebas unitarias pasando ≥80% cobertura","Desarrollo","Obligatorio"],
      ["DEV-007","Pruebas de regresión OK","Desarrollo","Obligatorio"],
      ["SCAN-001","Escaneo SonarQube local ejecutado","Escaneo","Obligatorio"],
      ["SCAN-002","Quality Gate: PASSED — 0 Críticos/Altos","Escaneo","Bloqueante"],
      ["SCAN-003","Reporte PDF escaneo descargado","Escaneo","Obligatorio"],
      ["DEP-001","ZIP de respaldo BACKUP_CIP generado","Despliegue","Bloqueante"],
      ["DEP-002","Ventana de mantenimiento confirmada","Despliegue","Obligatorio"],
      ["DEP-003","Plan de rollback documentado","Despliegue","Obligatorio"],
      ["DEP-004","Despliegue ejecutado","Despliegue","Obligatorio"],
      ["POST-001","Smoke tests post-despliegue OK","Post-Deploy","Obligatorio"],
      ["POST-002","Re-escaneo DAST confirma corrección","Post-Deploy","Obligatorio"],
      [`POST-003`,`Ticket ${cfg.ticket} cerrado`,"Cierre","Obligatorio"],
      ["POST-004","Evidencias archivadas","Cierre","Obligatorio"],
      ["OWASP-A3","OWASP A03:2021 Injection mitigado","Normas","Recomendado"],
      ["OWASP-A6","OWASP A06:2021 Outdated Components mitigado","Normas","Recomendado"],
    ];
    return "ID_Control,Descripcion,Categoria,Obligatoriedad,Estado,Responsable,Fecha,Observaciones\n"+
      rows.map(r=>`${r[0]},"${r[1]}",${r[2]},${r[3]},PENDIENTE,,,""`).join("\n");
  };

  const genCIP = ()=>{
    let csv="No,Archivo,Ruta_Completa,Tipo,Accion,Repo,Severity_Max,Issues,Hrs,Issue_IDs\n";
    csv+=cipData.map((c,i)=>{
      const ids=issues.filter(iss=>iss.filePath===c.filePath).map(iss=>iss.id.substring(0,8)).join("|");
      const tipo=c.filePath.includes("packages.config")?"NuGet Config":c.filePath.endsWith(".js")?"JavaScript":"Otro";
      return `${i+1},"${c.fileName}","${c.filePath}",${tipo},${c.action},${c.repo},${c.severity},${c.count},${c.hrs},"${ids}"`;
    }).join("\n");
    csv+=`\n\n# Total archivos: ${cipData.length}\n# Total issues: ${stats.total}\n# Horas: ${stats.hrs}\n# Ticket: ${cfg.ticket}\n# Generado: ${TODAY_D}`;
    return csv;
  };

  const dlFile=(name,content)=>{ const b=new Blob([content],{type:"text/plain;charset=utf-8"}); const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download=name; a.click(); };
  const dlAll=()=>{
    dlFile(`DISEÑO_GENERAL_${cfg.projectName}_${TODAY}.txt`,genDG());
    setTimeout(()=>dlFile(`DISEÑO_TECNICO_${cfg.projectName}_${TODAY}.txt`,genDT()),300);
    setTimeout(()=>dlFile(`CHECKLIST_CUMPLIMIENTO_${cfg.projectName}_${TODAY}.csv`,genCK()),600);
    setTimeout(()=>dlFile(`CIP_${cfg.projectName}_${TODAY}.csv`,genCIP()),900);
    showToast("4 documentos descargados ✓"); setDone(p=>new Set([...p,2]));
  };
  const dl1=(t)=>{
    const m={dg:{n:`DISEÑO_GENERAL_${cfg.projectName}_${TODAY}.txt`,f:genDG},dt:{n:`DISEÑO_TECNICO_${cfg.projectName}_${TODAY}.txt`,f:genDT},ck:{n:`CHECKLIST_CUMPLIMIENTO_${cfg.projectName}_${TODAY}.csv`,f:genCK},cip:{n:`CIP_${cfg.projectName}_${TODAY}.csv`,f:genCIP}};
    dlFile(m[t].n,m[t].f()); showToast(m[t].n+" descargado");
  };

  const completePhase=n=>{ setDone(p=>new Set([...p,n])); showToast(`Fase ${n} completada ✓`); if(n<5)setPhase(n+1); };
  const progress=Math.round((done.size/6)*100);
  const PHASES=["Importar Excel","Diagnóstico","Documentos","Aprobación","Ejecución","Despliegue"];

  // ── RENDER ───────────────────────────────────────────────────────────────────
  return (
    <div style={{fontFamily:"'Segoe UI',sans-serif",background:"#060B14",minHeight:"100vh",color:"#D0DCF0",fontSize:13}}>

      {/* TOPBAR */}
      <div style={{background:"#0A1020",borderBottom:"1px solid #1A2840",padding:"0 24px",height:52,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:30,height:30,background:"linear-gradient(135deg,#00D4FF,#7C3AED)",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>🔐</div>
          <span style={{fontSize:15,fontWeight:700,color:"#E0EDFF"}}>DevSecOps · Vulnerability Analyzer</span>
        </div>
        <div style={{fontSize:11,color:"#3A5070",fontFamily:"monospace"}}>{cfg.ticket} | {issues.length} issues | {TODAY_D}</div>
      </div>

      <div style={{display:"flex",minHeight:"calc(100vh - 52px)"}}>

        {/* SIDEBAR */}
        <nav style={{width:200,background:"#0A1020",borderRight:"1px solid #1A2840",padding:"16px 0",flexShrink:0,display:"flex",flexDirection:"column"}}>
          <div style={{fontSize:9,color:"#2A4060",letterSpacing:2,padding:"0 14px 10px",textTransform:"uppercase",fontFamily:"monospace"}}>FASES SOP</div>
          {PHASES.map((p,i)=>(
            <button key={i} onClick={()=>setPhase(i)} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 14px",width:"100%",border:"none",background:phase===i?"#0F1E35":"transparent",color:done.has(i)?"#00E676":phase===i?"#00D4FF":"#4A6080",cursor:"pointer",textAlign:"left",fontSize:11,fontWeight:600,borderLeft:`2px solid ${phase===i?"#00D4FF":done.has(i)?"#00E676":"transparent"}`,transition:"all 0.15s"}}>
              <span style={{width:20,height:20,borderRadius:"50%",background:done.has(i)?"#00E676":phase===i?"#00D4FF":"#1A2840",color:done.has(i)||phase===i?"#000":"#4A6080",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,flexShrink:0}}>{done.has(i)?"✓":i}</span>
              {p}
            </button>
          ))}
          <div style={{marginTop:"auto",padding:"14px",borderTop:"1px solid #1A2840"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span style={{fontSize:10,color:"#2A4060",fontFamily:"monospace"}}>PROGRESO</span>
              <span style={{fontSize:10,color:"#00D4FF",fontFamily:"monospace"}}>{progress}%</span>
            </div>
            <div style={{background:"#0F1E35",borderRadius:4,height:4}}>
              <div style={{height:4,background:"linear-gradient(90deg,#00D4FF,#7C3AED)",borderRadius:4,width:`${progress}%`,transition:"width 0.4s"}}/>
            </div>
          </div>
        </nav>

        {/* MAIN */}
        <main style={{flex:1,padding:"24px 28px",overflow:"auto"}}>


          {/* ── FASE 0: IMPORTACIÓN ── */}
          {phase===0&&<ImportacionPhase cfg={cfg} setCfg={setCfg} issues={issues} stats={stats} fileRef={fileRef} handleFile={handleFile} lbl={lbl} inp={inp} card={card} infoBox={infoBox} warnBox={warnBox} btnP={btnP} completePhase={completePhase} sevBadge={sevBadge} methBadge={methBadge}/>}

          {/* ── FASE 1: DIAGNÓSTICO ── */}
          {phase===1&&<DiagnosticoPhase cfg={cfg} issues={issues} repos={repos} stats={stats} sonarData={sonarData} setSonarF={setSonarF} fetchSonar={fetchSonar} mcpUrl={mcpUrl} setMcpUrl={setMcpUrl} mcpStatus={mcpStatus} checkMcpStatus={checkMcpStatus} getSonarUrl={getSonarUrl} checkRepo={checkRepo} checkAll={checkAll} completePhase={completePhase} showSources={showSources} setShowSources={setShowSources} getSourcesDisplay={getSourcesDisplay} card={card} inp={inp} infoBox={infoBox} warnBox={warnBox} lbl={lbl} btnP={btnP} btnS={btnS} btnG={btnG} btnA={btnA} dot={dot} methBadge={methBadge} sevBadge={sevBadge}/>}

          {/* ── FASE 2: DOCUMENTOS ── */}
          {phase===2&&<DocumentosPhase cfg={cfg} issues={issues} cipData={cipData} docData={docData} docTab={docTab} setDocTab={setDocTab} setVulnF={setVulnF} stats={stats} sonarData={sonarData} genDG={genDG} genDT={genDT} genCK={genCK} genCIP={genCIP} dl1={dl1} dlAll={dlAll} completePhase={completePhase} showSources={showSources} setShowSources={setShowSources} getSourcesDisplay={getSourcesDisplay} TODAY={TODAY} card={card} inp={inp} ta={ta} infoBox={infoBox} warnBox={warnBox} codeBox={codeBox} lbl={lbl} btnP={btnP} btnS={btnS} btnG={btnG} sevBadge={sevBadge} claudeKey={claudeKey} setClaudeKey={setClaudeKey} fetchAI={fetchAI} aiLoading={aiLoading}/>}

          {/* ── FASES 3-5 ── */}
          {phase>=3&&<GenericPhase phase={phase} cfg={cfg} cipData={cipData} TODAY={TODAY} dlAll={dlAll} completePhase={completePhase} card={card} infoBox={infoBox} btnP={btnP} btnS={btnS}/>}
        </main>
      </div>

      {/* TOAST */}
      {toast&&(
        <div style={{position:"fixed",bottom:20,right:20,zIndex:9999,background:"#0A1020",border:`1px solid ${toast.type==="ok"?"#00E676":"#FFB800"}`,borderRadius:8,padding:"10px 16px",fontSize:12,color:toast.type==="ok"?"#00E676":"#FFB800",fontFamily:"monospace",boxShadow:`0 8px 24px ${toast.type==="ok"?"#00E67620":"#FFB80020"}`,animation:"slideIn 0.2s ease"}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);


</script>
</body>
